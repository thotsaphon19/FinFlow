<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFlow — ระบบบัญชีรายรับรายจ่าย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ─── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
  --sidebar-w: 220px;
  --topbar-h: 58px;

  /* Brand */
  --brand: #5b4fcf;
  --brand-light: #ede9ff;
  --brand-dark: #3d3499;
  --brand-glow: rgba(91,79,207,.18);

  /* Semantic */
  --income: #059669;
  --income-bg: #d1fae5;
  --expense: #dc2626;
  --expense-bg: #fee2e2;
  --warning: #d97706;
  --warning-bg: #fef3c7;

  /* Surfaces */
  --bg: #f4f3fb;
  --surface: #ffffff;
  --surface2: #f9f8fe;
  --sidebar-bg: #1b1640;
  --sidebar-hover: rgba(255,255,255,.07);
  --sidebar-active: rgba(91,79,207,.35);

  /* Text */
  --text: #1a1836;
  --text-2: #5e5c7a;
  --text-3: #9896b0;
  --text-inv: #ffffff;

  /* Borders */
  --border: rgba(0,0,0,.07);
  --border-2: rgba(0,0,0,.12);

  /* Radius & Shadow */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
}
[data-theme="dark"] {
  --bg: #0f0e1a;
  --surface: #1a1830;
  --surface2: #221f3a;
  --sidebar-bg: #0b0a18;
  --text: #eeedf8;
  --text-2: #9896b8;
  --text-3: #5e5c80;
  --border: rgba(255,255,255,.07);
  --border-2: rgba(255,255,255,.13);
  --brand-light: #2a2460;
  --income-bg: #064e3b;
  --expense-bg: #450a0a;
  --warning-bg: #451a03;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
}

html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  transition: background .3s, color .3s;
}

/* ─── Scrollbar ────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }

/* ─── Login ────────────────────────────────────── */
#loginPage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--sidebar-bg);
  position: relative;
  overflow: hidden;
}
#loginPage::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(91,79,207,.25) 0%, transparent 70%);
  top: -200px; left: -200px;
  pointer-events: none;
}
#loginPage::after {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(91,79,207,.15) 0%, transparent 70%);
  bottom: -100px; right: -100px;
  pointer-events: none;
}
.login-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 20px;
  padding: 2.5rem 2rem;
  width: 360px;
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 1;
}
.login-brand {
  text-align: center;
  margin-bottom: 2rem;
}
.login-brand .logo-icon {
  width: 56px; height: 56px;
  background: var(--brand);
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: #fff;
  margin-bottom: .75rem;
  box-shadow: 0 8px 24px rgba(91,79,207,.4);
}
.login-brand h1 { color: #fff; font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
.login-brand p { color: rgba(255,255,255,.45); font-size: 13px; margin-top: 3px; }
.login-field { margin-bottom: 1rem; }
.login-field label { display: block; color: rgba(255,255,255,.5); font-size: 11px; font-weight: 500; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
.login-field input {
  width: 100%;
  padding: .6rem .875rem;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: var(--r-sm);
  color: #fff;
  font-size: 14px;
  font-family: var(--font);
  transition: border-color .2s, background .2s;
  outline: none;
}
.login-field input:focus { border-color: var(--brand); background: rgba(91,79,207,.12); }
.login-field input::placeholder { color: rgba(255,255,255,.2); }
.login-btn-wrap { margin-top: 1.5rem; }
.btn-login {
  width: 100%;
  padding: .7rem;
  background: var(--brand);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 4px 12px rgba(91,79,207,.4);
}
.btn-login:hover { background: var(--brand-dark); box-shadow: 0 6px 20px rgba(91,79,207,.5); }
.btn-login:active { transform: scale(.98); }
.login-hint { color: rgba(255,255,255,.25); font-size: 11px; text-align: center; margin-top: .875rem; }
.login-error {
  background: rgba(220,38,38,.15);
  border: 1px solid rgba(220,38,38,.3);
  color: #fca5a5;
  border-radius: var(--r-sm);
  padding: .5rem .75rem;
  font-size: 12px;
  margin-top: .75rem;
  display: none;
}

/* ─── App Layout ───────────────────────────────── */
#appPage { display: none; min-height: 100vh; }
.layout { display: flex; min-height: 100vh; }

/* ─── Sidebar ──────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform .3s;
}
.sidebar-logo {
  padding: 1.25rem 1.25rem 1rem;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  margin-bottom: .5rem;
}
.sidebar-logo .icon {
  width: 34px; height: 34px;
  background: var(--brand);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 17px;
  flex-shrink: 0;
}
.sidebar-logo span { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -.2px; }
.sidebar-logo small { color: rgba(255,255,255,.3); font-size: 10px; display: block; margin-top: -2px; }
.nav-section { padding: .25rem 0; }
.nav-label { color: rgba(255,255,255,.22); font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: .6rem 1.25rem .25rem; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: .55rem 1.25rem;
  color: rgba(255,255,255,.45);
  cursor: pointer;
  font-size: 13px;
  transition: all .18s;
  border-left: 3px solid transparent;
  user-select: none;
}
.nav-item i { font-size: 16px; width: 18px; text-align: center; }
.nav-item:hover { color: rgba(255,255,255,.8); background: var(--sidebar-hover); }
.nav-item.active { color: #fff; background: var(--sidebar-active); border-left-color: var(--brand); }
.sidebar-footer {
  margin-top: auto;
  padding: 1rem 1.25rem;
  border-top: 1px solid rgba(255,255,255,.06);
}
.user-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--brand);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { color: rgba(255,255,255,.85); font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { color: rgba(255,255,255,.3); font-size: 10px; }
.btn-logout { color: rgba(255,255,255,.3); background: none; border: none; cursor: pointer; padding: 4px; border-radius: 6px; transition: color .2s; }
.btn-logout:hover { color: rgba(255,255,255,.7); }

/* ─── Main ─────────────────────────────────────── */
.main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-left h1 { font-size: 15px; font-weight: 600; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.content { padding: 1.5rem; flex: 1; }

/* ─── Buttons ──────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: .45rem .875rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text-2);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all .18s;
  white-space: nowrap;
}
.btn i { font-size: 14px; }
.btn:hover { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }
.btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); color: #fff; }
.btn-success { background: var(--income); color: #fff; border-color: var(--income); }
.btn-success:hover { background: #047857; color: #fff; }
.btn-danger { background: var(--expense); color: #fff; border-color: var(--expense); }
.btn-danger:hover { background: #b91c1c; color: #fff; }
.btn-sm { padding: .3rem .6rem; font-size: 11px; }
.btn-icon { padding: .4rem; border-radius: var(--r-sm); }

/* ─── Cards ────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .875rem 1.25rem;
  border-bottom: 1px solid var(--border);
}
.card-header h3 { font-size: 13px; font-weight: 600; color: var(--text); }
.card-body { padding: 1.25rem; }

/* ─── Stats Grid ───────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.25rem; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1rem 1.125rem;
  position: relative;
  overflow: hidden;
  transition: box-shadow .2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-card::before {
  content: '';
  position: absolute;
  width: 60px; height: 60px;
  border-radius: 50%;
  top: -15px; right: -15px;
  opacity: .12;
}
.stat-card.income-card::before { background: var(--income); }
.stat-card.expense-card::before { background: var(--expense); }
.stat-card.balance-card::before { background: var(--brand); }
.stat-card.count-card::before { background: var(--warning); }
.stat-icon {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  margin-bottom: .625rem;
}
.stat-icon.income { background: var(--income-bg); color: var(--income); }
.stat-icon.expense { background: var(--expense-bg); color: var(--expense); }
.stat-icon.balance { background: var(--brand-light); color: var(--brand); }
.stat-icon.count { background: var(--warning-bg); color: var(--warning); }
.stat-label { font-size: 11px; color: var(--text-3); font-weight: 500; margin-bottom: 3px; }
.stat-value { font-size: 20px; font-weight: 600; line-height: 1.2; }
.stat-value.income { color: var(--income); }
.stat-value.expense { color: var(--expense); }
.stat-value.balance { color: var(--brand); }
.stat-value.neutral { color: var(--text); }
.stat-sub { font-size: 10px; color: var(--text-3); margin-top: 3px; }

/* ─── Charts ───────────────────────────────────── */
.chart-row { display: grid; grid-template-columns: 1.85fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
.chart-wrap { position: relative; }

/* ─── Table ────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  padding: .6rem 1rem;
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .6px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td { padding: .6rem 1rem; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }
.amount-income { color: var(--income); font-weight: 500; }
.amount-expense { color: var(--expense); font-weight: 500; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-income { background: var(--income-bg); color: var(--income); }
.badge-expense { background: var(--expense-bg); color: var(--expense); }
.badge-balance { background: var(--brand-light); color: var(--brand); }
.tbl-actions { display: flex; gap: 4px; align-items: center; }
.action-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  color: var(--text-3);
  transition: all .18s;
  font-size: 14px;
}
.action-btn:hover { background: var(--brand-light); color: var(--brand); }
.action-btn.danger:hover { background: var(--expense-bg); color: var(--expense); }

/* ─── Filters ──────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 8px;
  padding: .75rem 1rem;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar select, .filter-bar input[type="text"] {
  padding: .35rem .7rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color .2s;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--brand); }
.filter-bar input[type="text"] { min-width: 180px; flex: 1; }
.tbl-summary {
  display: flex;
  gap: 1.25rem;
  padding: .65rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  font-size: 12px;
  color: var(--text-2);
  flex-wrap: wrap;
}
.tbl-summary strong { font-weight: 600; }

/* ─── Form ─────────────────────────────────────── */
.type-toggle { display: flex; gap: 8px; margin-bottom: 1.125rem; }
.type-btn {
  flex: 1;
  padding: .55rem;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.type-btn.sel-income { background: var(--income-bg); border-color: var(--income); color: var(--income); }
.type-btn.sel-expense { background: var(--expense-bg); border-color: var(--expense); color: var(--expense); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .4px; }
.form-group input, .form-group select, .form-group textarea {
  padding: .5rem .75rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color .2s, background .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--brand);
  background: var(--surface);
}
.form-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ─── Report Periods ───────────────────────────── */
.period-tabs { display: flex; gap: 6px; margin-bottom: 1.125rem; }
.period-tab {
  padding: .4rem .875rem;
  border-radius: 99px;
  border: 1px solid var(--border-2);
  background: transparent;
  color: var(--text-2);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
}
.period-tab.active { background: var(--brand); border-color: var(--brand); color: #fff; }
.period-tab:hover:not(.active) { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }

/* ─── Settings ─────────────────────────────────── */
.settings-grid { display: flex; flex-direction: column; gap: 1rem; }
.setting-row { display: flex; align-items: center; gap: 12px; padding-bottom: .75rem; border-bottom: 1px solid var(--border); }
.setting-row:last-child { border-bottom: none; padding-bottom: 0; }
.setting-label { font-size: 12px; font-weight: 600; color: var(--text-2); width: 130px; flex-shrink: 0; }
.setting-desc { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.setting-input { flex: 1; }
.setting-input input {
  width: 100%;
  padding: .45rem .7rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-2);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  outline: none;
}
.setting-input input:focus { border-color: var(--brand); }
.sync-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
}
.sync-ok { background: var(--income-bg); color: var(--income); }
.sync-err { background: var(--expense-bg); color: var(--expense); }

/* ─── Toggle Switch ────────────────────────────── */
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--border-2);
  border-radius: 99px;
  cursor: pointer;
  transition: .2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  left: 3px; top: 3px;
  transition: .2s;
}
.toggle input:checked + .toggle-slider { background: var(--brand); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }

/* ─── Utility ──────────────────────────────────── */
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.mt-1 { margin-top: .5rem; }
.mt-3 { margin-top: 1rem; }
.text-muted { color: var(--text-3); }
.text-sm { font-size: 12px; }
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-3);
}
.empty-state i { font-size: 40px; opacity: .4; display: block; margin-bottom: .75rem; }
.empty-state p { font-size: 13px; }

/* ─── Toast ────────────────────────────────────── */
#toastWrap { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--text);
  color: var(--surface);
  padding: .65rem 1rem;
  border-radius: var(--r-md);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-md);
  animation: toastIn .3s ease;
  max-width: 280px;
}
.toast.success { background: var(--income); color: #fff; }
.toast.error { background: var(--expense); color: #fff; }
@keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ─── Responsive ───────────────────────────────── */
@media (max-width: 900px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-220px); width: 220px; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-row { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .content { padding: 1rem; }
  .topbar { padding: 0 1rem; }
}

/* ─── Print ────────────────────────────────────── */
@media print {
  .sidebar, .topbar, .btn, .filter-bar, .tbl-actions, .form-actions, .period-tabs { display: none !important; }
  .main { margin-left: 0; }
  .content { padding: 0; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo-icon"><i class="ti ti-currency-baht"></i></div>
      <h1>FinFlow</h1>
      <p>ระบบบัญชีรายรับรายจ่าย</p>
    </div>
    <div class="login-field">
      <label>ชื่อผู้ใช้</label>
      <input id="loginUser" type="text" placeholder="กรอกชื่อผู้ใช้" autocomplete="username">
    </div>
    <div class="login-field">
      <label>รหัสผ่าน</label>
      <input id="loginPass" type="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password">
    </div>
    <div id="loginError" class="login-error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    <div class="login-btn-wrap">
      <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    </div>
    <p class="login-hint">demo / 1234 &nbsp;·&nbsp; admin / admin</p>
  </div>
</div>

<!-- APP -->
<div id="appPage">
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="icon"><i class="ti ti-currency-baht"></i></div>
        <div>
          <span>FinFlow</span>
          <small>บัญชีส่วนตัว</small>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">เมนูหลัก</div>
        <div class="nav-item active" data-page="overview"><i class="ti ti-layout-dashboard"></i>ภาพรวม</div>
        <div class="nav-item" data-page="add"><i class="ti ti-circle-plus"></i>เพิ่มรายการ</div>
        <div class="nav-item" data-page="transactions"><i class="ti ti-list-details"></i>รายการทั้งหมด</div>
      </div>
      <div class="nav-section">
        <div class="nav-label">วิเคราะห์</div>
        <div class="nav-item" data-page="reports"><i class="ti ti-chart-bar"></i>รายงาน</div>
        <div class="nav-item" data-page="categories"><i class="ti ti-tag"></i>หมวดหมู่</div>
      </div>
      <div class="nav-section">
        <div class="nav-label">ระบบ</div>
        <div class="nav-item" data-page="settings"><i class="ti ti-settings"></i>ตั้งค่า</div>
      </div>
      <div class="sidebar-footer">
        <div class="user-row">
          <div class="user-avatar" id="sidebarAvatar">ส</div>
          <div class="user-info">
            <div class="user-name" id="sidebarName">สมชาย ใจดี</div>
            <div class="user-role">บัญชีส่วนตัว</div>
          </div>
          <button class="btn-logout" onclick="doLogout()" title="ออกจากระบบ"><i class="ti ti-logout"></i></button>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn btn-icon" id="menuToggle" onclick="toggleSidebar()" style="display:none"><i class="ti ti-menu-2"></i></button>
          <h1 id="pageTitle">ภาพรวม</h1>
        </div>
        <div class="topbar-right">
          <button class="btn" id="exportExcelBtn" onclick="exportExcel()" style="display:none"><i class="ti ti-file-spreadsheet"></i>Excel</button>
          <button class="btn" id="exportPdfBtn" onclick="exportPDF()" style="display:none"><i class="ti ti-printer"></i>PDF</button>
          <button class="btn" onclick="toggleTheme()" title="เปลี่ยนธีม"><i class="ti ti-sun-moon"></i></button>
          <button class="btn btn-primary" onclick="goAddNew()"><i class="ti ti-plus"></i>เพิ่มรายการ</button>
        </div>
      </header>
      <div class="content" id="pageContent"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toastWrap"></div>

<script>
/* ══════════════════════════════════════════════════
   DATA & STATE
══════════════════════════════════════════════════ */
const USERS = [
  { u: 'demo', p: '1234', name: 'สมชาย ใจดี' },
  { u: 'admin', p: 'admin', name: 'ผู้ดูแลระบบ' }
];
const CATS = {
  income: ['เงินเดือน', 'ธุรกิจ', 'การลงทุน', 'โบนัส', 'ฟรีแลนซ์', 'รายได้อื่นๆ'],
  expense: ['อาหาร & เครื่องดื่ม', 'ที่พัก', 'เดินทาง', 'สุขภาพ', 'ช้อปปิ้ง', 'บันเทิง', 'ค่าสาธารณูปโภค', 'การศึกษา', 'ประกันภัย', 'อื่นๆ']
};
const PALETTE = ['#5b4fcf','#059669','#dc2626','#d97706','#0891b2','#7c3aed','#db2777','#16a34a','#ea580c','#0284c7'];

let app = {
  loggedIn: false,
  user: null,
  page: 'overview',
  transactions: [],
  formType: 'expense',
  editId: null,
  reportPeriod: 'monthly',
  gs: { webAppUrl: '', enabled: false },
  filter: { type: 'all', year: 'all', month: 'all', search: '' },
  charts: {}
};

/* ══════════════════════════════════════════════════
   PERSIST
══════════════════════════════════════════════════ */
function save() {
  try { localStorage.setItem('ff_txns', JSON.stringify(app.transactions)); } catch(e){}
  try { localStorage.setItem('ff_gs', JSON.stringify(app.gs)); } catch(e){}  // เก็บ config GS ไว้ใน local
}
async function load() {
  // โหลด config GS จาก localStorage
  try { const d = localStorage.getItem('ff_gs'); if(d) app.gs = { ...app.gs, ...JSON.parse(d) }; } catch(e){}

  if (app.gs.enabled && app.gs.webAppUrl) {
    // ถ้าเปิด GS → ดึงข้อมูลจาก Sheet เป็นหลัก
    showLoadingOverlay(true);
    const ok = await pullFromGS();
    showLoadingOverlay(false);
    if (!ok) {
      // fallback ใช้ local
      try { const d = localStorage.getItem('ff_txns'); if(d) app.transactions = JSON.parse(d); } catch(e){}
      toast('ดึงข้อมูลจาก Google Sheet ไม่ได้ — ใช้ข้อมูลในเครื่องแทน', 'error');
    }
  } else {
    // ไม่ได้เปิด GS → ใช้ localStorage
    const initialized = localStorage.getItem('ff_initialized');
    if (!initialized) {
      localStorage.removeItem('ff_txns');
      localStorage.setItem('ff_initialized', '1');
      app.transactions = [];
    } else {
      try { const d = localStorage.getItem('ff_txns'); if(d) app.transactions = JSON.parse(d); } catch(e){}
    }
  }
}

function showLoadingOverlay(show) {
  let el = document.getElementById('gsLoadingOverlay');
  if (show) {
    if (!el) {
      el = document.createElement('div');
      el.id = 'gsLoadingOverlay';
      el.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px';
      el.innerHTML = '<div style="width:36px;height:36px;border:3px solid var(--border-2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite"></div><p style="color:var(--text-2);font-size:13px">กำลังโหลดข้อมูลจาก Google Sheet…</p>';
      document.body.appendChild(el);
    }
    el.style.display = 'flex';
  } else {
    if (el) el.remove();
  }
}

/* ══════════════════════════════════════════════════
   SEED
══════════════════════════════════════════════════ */
function seedData() {
  const now = new Date();
  const txns = [];
  for (let m = 0; m < 6; m++) {
    const mo = new Date(now.getFullYear(), now.getMonth() - m, 1);
    txns.push({ id: Date.now() + m * 10000, type: 'income', amount: 28000 + Math.random() * 8000, category: 'เงินเดือน', date: fmtDateInput(new Date(mo.getFullYear(), mo.getMonth(), 25)), note: 'เงินเดือนประจำเดือน' });
    if (m % 2 === 0) txns.push({ id: Date.now() + m * 10000 + 1, type: 'income', amount: 2000 + Math.random() * 6000, category: 'ฟรีแลนซ์', date: fmtDateInput(new Date(mo.getFullYear(), mo.getMonth(), 10)), note: 'งานเสริม' });
    CATS.expense.slice(0, 7).forEach((cat, i) => {
      const d = new Date(mo.getFullYear(), mo.getMonth(), 3 + i * 4);
      txns.push({ id: Date.now() + m * 10000 + i + 10, type: 'expense', amount: 300 + Math.random() * 3500, category: cat, date: fmtDateInput(d), note: '' });
    });
  }
  app.transactions = txns;
  save();
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
const now = () => new Date();
function fmtDateInput(d) { return d.toISOString().slice(0, 10); }
function fmtDate(d) { return new Date(d).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' }); }
function fmtMoney(n) { return new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n); }
function fmtMoneyShort(n) {
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return Math.round(n).toString();
}
function getMonthTxns(y, m) {
  return app.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });
}
function sumType(txns, type) { return txns.filter(t => t.type === type).reduce((s, t) => s + t.amount, 0); }
function destroyCharts() {
  Object.values(app.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  app.charts = {};
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="ti ti-${type === 'success' ? 'check' : type === 'error' ? 'x' : 'info-circle'}"></i>${msg}`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ══════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════ */
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const found = USERS.find(x => x.u === u && x.p === p);
  if (found) {
    app.loggedIn = true;
    app.user = found;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    document.getElementById('sidebarName').textContent = found.name;
    document.getElementById('sidebarAvatar').textContent = found.name.charAt(0);
    load().then(() => renderPage('overview'));
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  app.loggedIn = false;
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* ══════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════ */
const PAGE_TITLES = { overview: 'ภาพรวม', add: 'เพิ่มรายการ', transactions: 'รายการทั้งหมด', reports: 'รายงาน', categories: 'หมวดหมู่', settings: 'ตั้งค่า' };
function renderPage(page) {
  destroyCharts();
  app.page = page;
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  const exportBtns = ['transactions', 'reports', 'overview'];
  document.getElementById('exportExcelBtn').style.display = exportBtns.includes(page) ? '' : 'none';
  document.getElementById('exportPdfBtn').style.display = exportBtns.includes(page) ? '' : 'none';
  const pages = { overview: renderOverview, add: renderAdd, transactions: renderTransactions, reports: renderReports, categories: renderCategories, settings: renderSettings };
  (pages[page] || renderOverview)();
}
document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => { app.editId = null; renderPage(el.dataset.page); }));
function goAddNew() { app.editId = null; renderPage('add'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? '' : 'dark');
}

/* ══════════════════════════════════════════════════
   OVERVIEW
══════════════════════════════════════════════════ */
function renderOverview() {
  const n = now();
  const mt = getMonthTxns(n.getFullYear(), n.getMonth());
  const inc = sumType(mt, 'income');
  const exp = sumType(mt, 'expense');
  const bal = inc - exp;
  const recent = app.transactions.slice().sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 7);
  // 6-month data
  const months = [], incData = [], expData = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(n.getFullYear(), n.getMonth() - i, 1);
    months.push(d.toLocaleDateString('th-TH', { month: 'short' }));
    const txns = getMonthTxns(d.getFullYear(), d.getMonth());
    incData.push(Math.round(sumType(txns, 'income')));
    expData.push(Math.round(sumType(txns, 'expense')));
  }
  // Category donut
  const catMap = {};
  mt.filter(t => t.type === 'expense').forEach(t => { catMap[t.category] = (catMap[t.category] || 0) + t.amount; });
  const catKeys = Object.keys(catMap);
  const catVals = catKeys.map(k => Math.round(catMap[k]));

  document.getElementById('pageContent').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card income-card"><div class="stat-icon income"><i class="ti ti-trending-up"></i></div><div class="stat-label">รายรับเดือนนี้</div><div class="stat-value income">฿${fmtMoney(inc)}</div><div class="stat-sub">เดือน${n.toLocaleDateString('th-TH',{month:'long'})}</div></div>
      <div class="stat-card expense-card"><div class="stat-icon expense"><i class="ti ti-trending-down"></i></div><div class="stat-label">รายจ่ายเดือนนี้</div><div class="stat-value expense">฿${fmtMoney(exp)}</div><div class="stat-sub">เดือน${n.toLocaleDateString('th-TH',{month:'long'})}</div></div>
      <div class="stat-card balance-card"><div class="stat-icon balance"><i class="ti ti-wallet"></i></div><div class="stat-label">คงเหลือเดือนนี้</div><div class="stat-value balance">฿${fmtMoney(bal)}</div><div class="stat-sub">${bal >= 0 ? '✓ มีเงินเหลือ' : '⚠ รายจ่ายเกิน'}</div></div>
      <div class="stat-card count-card"><div class="stat-icon count"><i class="ti ti-receipt"></i></div><div class="stat-label">รายการทั้งหมด</div><div class="stat-value neutral">${app.transactions.length}</div><div class="stat-sub">รายการสะสม</div></div>
    </div>
    <div class="chart-row">
      <div class="card">
        <div class="card-header"><h3>รายรับ-รายจ่าย 6 เดือนล่าสุด</h3></div>
        <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="barChart" role="img" aria-label="กราฟแท่งรายรับรายจ่าย 6 เดือน">รายรับรายจ่าย 6 เดือน</canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>สัดส่วนรายจ่าย</h3></div>
        <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="donutChart" role="img" aria-label="กราฟวงกลมสัดส่วนรายจ่าย">สัดส่วนรายจ่าย</canvas></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>รายการล่าสุด</h3><button class="btn btn-sm" onclick="renderPage('transactions')">ดูทั้งหมด <i class="ti ti-arrow-right"></i></button></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th><th style="text-align:right">จำนวน</th></tr></thead>
          <tbody>${recent.map(t => `<tr>
            <td>${fmtDate(t.date)}</td>
            <td><span class="badge badge-${t.type}">${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'}</span></td>
            <td>${t.category}</td>
            <td class="text-muted text-sm">${t.note || '—'}</td>
            <td class="amount-${t.type}" style="text-align:right">฿${fmtMoney(t.amount)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;

  app.charts.bar = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: months,
      datasets: [
        { label: 'รายรับ', data: incData, backgroundColor: '#059669', borderRadius: 5, borderSkipped: false },
        { label: 'รายจ่าย', data: expData, backgroundColor: '#dc2626', borderRadius: 5, borderSkipped: false }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { boxWidth: 10, font: { size: 11 } } } },
      scales: {
        y: { ticks: { callback: v => fmtMoneyShort(v), font: { size: 10 } }, grid: { color: 'rgba(128,128,128,.1)' } },
        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });

  if (catKeys.length) {
    app.charts.donut = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: { labels: catKeys, datasets: [{ data: catVals, backgroundColor: PALETTE, borderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 10 }, padding: 5 } } }
      }
    });
  }
}

/* ══════════════════════════════════════════════════
   ADD / EDIT
══════════════════════════════════════════════════ */
function renderAdd() {
  const edit = app.editId ? app.transactions.find(t => t.id === app.editId) : null;
  const ft = edit ? edit.type : app.formType;
  document.getElementById('pageContent').innerHTML = `
    <div class="card" style="max-width:600px">
      <div class="card-header"><h3>${edit ? 'แก้ไขรายการ' : 'เพิ่มรายการใหม่'}</h3></div>
      <div class="card-body">
        <div class="type-toggle">
          <button class="type-btn ${ft === 'income' ? 'sel-income' : ''}" id="btnIncome" onclick="setType('income')"><i class="ti ti-trending-up"></i>+ รายรับ</button>
          <button class="type-btn ${ft === 'expense' ? 'sel-expense' : ''}" id="btnExpense" onclick="setType('expense')"><i class="ti ti-trending-down"></i>- รายจ่าย</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>จำนวนเงิน (บาท)</label>
            <input type="number" id="fAmt" placeholder="0.00" value="${edit ? edit.amount.toFixed(2) : ''}" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>วันที่</label>
            <input type="date" id="fDate" value="${edit ? edit.date : fmtDateInput(now())}">
          </div>
          <div class="form-group">
            <label>หมวดหมู่</label>
            <select id="fCat">${CATS[ft].map(c => `<option ${edit && edit.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select>
          </div>
          <div class="form-group">
            <label>หมายเหตุ</label>
            <input id="fNote" placeholder="(ไม่บังคับ)" value="${edit ? edit.note : ''}">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveEntry()"><i class="ti ti-check"></i>${edit ? 'บันทึกการแก้ไข' : 'บันทึกรายการ'}</button>
          ${edit ? `<button class="btn" onclick="app.editId=null; renderPage('add')"><i class="ti ti-x"></i>ยกเลิก</button>` : ''}
        </div>
      </div>
    </div>`;
}

function setType(type) {
  app.formType = type;
  app.editId = null;
  renderAdd();
}

function saveEntry() {
  const amt = parseFloat(document.getElementById('fAmt').value);
  const date = document.getElementById('fDate').value;
  const cat = document.getElementById('fCat').value;
  const note = document.getElementById('fNote').value.trim();
  if (!amt || amt <= 0) { toast('กรุณากรอกจำนวนเงิน', 'error'); return; }
  if (!date) { toast('กรุณาเลือกวันที่', 'error'); return; }
  if (app.editId) {
    const t = app.transactions.find(t => t.id === app.editId);
    if (t) { t.amount = amt; t.date = date; t.category = cat; t.note = note; t.type = app.formType; }
    app.editId = null;
    toast('แก้ไขรายการเรียบร้อย', 'success');
  } else {
    const entry = { id: Date.now(), type: app.formType, amount: amt, category: cat, date, note };

}

function applyFilter() {

  if (app.filter.month !== 'all') txns = txns.filter(t => new Date(t.date).getMonth() === +app.filter.month);
  if (app.filter.search) txns = txns.filter(t => t.category.toLowerCase().includes(app.filter.search) || t.note.toLowerCase().includes(app.filter.search));

function setReportPeriod(p) { app.reportPeriod = p; renderReports(); }

function buildReport() {
  const n = now();
  let rows = [];
  if (app.reportPeriod === 'monthly') {
    for (let i = 11; i >= 0; i--) {
      const d = new Date(n.getFullYear(), n.getMonth() - i, 1);
      const txns = getMonthTxns(d.getFullYear(), d.getMonth());
      rows.push({ label: d.toLocaleDateString('th-TH', { month: 'short', year: '2-digit' }), inc: sumType(txns, 'income'), exp: sumType(txns, 'expense') });
    }
  } else if (app.reportPeriod === 'yearly') {
    const years = [...new Set(app.transactions.map(t => new Date(t.date).getFullYear()))].sort();
    years.forEach(y => {
      const txns = app.transactions.filter(t => new Date(t.date).getFullYear() === y);
      rows.push({ label: String(y), inc: sumType(txns, 'income'), exp: sumType(txns, 'expense') });
    });
  } else if (app.reportPeriod === 'daily') {
    for (let i = 29; i >= 0; i--) {
      const d = new Date(n); d.setDate(n.getDate() - i);
      const ds = fmtDateInput(d);
      const txns = app.transactions.filter(t => t.date === ds);
      if (txns.length) rows.push({ label: d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short' }), inc: sumType(txns, 'income'), exp: sumType(txns, 'expense') });
    }
  } else {
    rows = [{ label: 'ทั้งหมด', inc: sumType(app.transactions, 'income'), exp: sumType(app.transactions, 'expense') }];
  }
  const totalInc = rows.reduce((s, r) => s + r.inc, 0);
  const totalExp = rows.reduce((s, r) => s + r.exp, 0);
  const wrap = document.getElementById('reportInner');
  wrap.innerHTML = `
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">
      <div class="stat-card income-card"><div class="stat-icon income"><i class="ti ti-trending-up"></i></div><div class="stat-label">รายรับรวม</div><div class="stat-value income">฿${fmtMoney(totalInc)}</div></div>
      <div class="stat-card expense-card"><div class="stat-icon expense"><i class="ti ti-trending-down"></i></div><div class="stat-label">รายจ่ายรวม</div><div class="stat-value expense">฿${fmtMoney(totalExp)}</div></div>
      <div class="stat-card balance-card"><div class="stat-icon balance"><i class="ti ti-wallet"></i></div><div class="stat-label">คงเหลือ</div><div class="stat-value balance">฿${fmtMoney(totalInc - totalExp)}</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-header"><h3>กราฟแนวโน้ม</h3></div>
      <div class="card-body"><div class="chart-wrap" style="height:220px"><canvas id="reportChart" role="img" aria-label="กราฟแนวโน้มรายรับรายจ่าย">แนวโน้มรายรับรายจ่าย</canvas></div></div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>ช่วงเวลา</th><th style="text-align:right">รายรับ</th><th style="text-align:right">รายจ่าย</th><th style="text-align:right">คงเหลือ</th><th style="text-align:right">%ออม</th></tr></thead>

            const bal = r.inc - r.exp;
            const savePct = r.inc > 0 ? Math.round((bal / r.inc) * 100) : 0;
            return `<tr>
              <td>${r.label}</td>
              <td class="amount-income" style="text-align:right">฿${fmtMoney(r.inc)}</td>
              <td class="amount-expense" style="text-align:right">฿${fmtMoney(r.exp)}</td>

            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;

  if (document.getElementById('reportChart')) {
    app.charts.report = new Chart(document.getElementById('reportChart'), {
      type: 'line',
      data: {
        labels: rows.map(r => r.label),

          { label: 'รายรับ', data: rows.map(r => Math.round(r.inc)), borderColor: '#059669', backgroundColor: 'rgba(5,150,105,.08)', fill: true, tension: .35, pointRadius: 3 },
          { label: 'รายจ่าย', data: rows.map(r => Math.round(r.exp)), borderColor: '#dc2626', backgroundColor: 'rgba(220,38,38,.08)', fill: true, tension: .35, pointRadius: 3 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { boxWidth: 10, font: { size: 11 } } } },
        scales: {

/* ── Google Sheets สองทาง ผ่าน Apps Script Web App ──
   Web App รับ:
     GET  ?action=read          → JSON array ของ rows
     POST body JSON             → เขียนทับทั้งชีต
   ───────────────────────────────────────────────── */
async function gsRequest(params) {
  if (!app.gs.webAppUrl) return null;
  try {
    if (params.action === 'read') {
      const res = await fetch(app.gs.webAppUrl + '?action=read');
      return await res.json();
    } else {
      const res = await fetch(app.gs.webAppUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(params)
      });
      return await res.json();
    }
  } catch(e) { console.warn('GS:', e); return null; }
}

function txnToRow(t) {
  return [t.id, t.date, t.type === 'income' ? 'รายรับ' : 'รายจ่าย', t.category, t.amount.toFixed(2), t.note || ''];
}
function rowToTxn(r) {
  if (!r[0]) return null;
  return { id: Number(r[0]), date: r[1], type: r[2] === 'รายรับ' ? 'income' : 'expense', category: r[3], amount: parseFloat(r[4]) || 0, note: r[5] || '' };
}

async function pushAllToGS() {
  if (!app.gs.enabled || !app.gs.webAppUrl) return;
  await gsRequest({ action: 'write', rows: app.transactions.map(txnToRow) });
}

async function pullFromGS() {
  if (!app.gs.enabled || !app.gs.webAppUrl) return false;
  const data = await gsRequest({ action: 'read' });
  if (!Array.isArray(data)) return false;
  app.transactions = data.map(rowToTxn).filter(Boolean);
  save();
  return true;
}

async function syncGS() {
  await pushAllToGS();
}

function exportExcel() {
  const data = [['วันที่', 'ประเภท', 'หมวดหมู่', 'จำนวน (บาท)', 'หมายเหตุ']];
  app.transactions.slice().sort((a, b) => new Date(b.date) - new Date(a.date))
    .forEach(t => data.push([t.date, t.type === 'income' ? 'รายรับ' : 'รายจ่าย', t.category, t.amount.toFixed(2), t.note]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 12 }, { wch: 10 }, { wch: 22 }, { wch: 14 }, { wch: 24 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'รายการ');
  // Summary sheet
  const n = now();
  const mt = getMonthTxns(n.getFullYear(), n.getMonth());
  const inc = sumType(app.transactions, 'income');
  const exp = sumType(app.transactions, 'expense');
  const sumData = [['สรุปภาพรวม'], ['รายรับรวม', inc.toFixed(2)], ['รายจ่ายรวม', exp.toFixed(2)], ['คงเหลือ', (inc - exp).toFixed(2)], [], ['เดือนนี้'], ['รายรับ', sumType(mt, 'income').toFixed(2)], ['รายจ่าย', sumType(mt, 'expense').toFixed(2)]];
  const ws2 = XLSX.utils.aoa_to_sheet(sumData);
  XLSX.utils.book_append_sheet(wb, ws2, 'สรุป');
  XLSX.writeFile(wb, `FinFlow_${fmtDateInput(n)}.xlsx`);
  toast('ดาวน์โหลด Excel แล้ว', 'success');
}

function importCSV() { document.getElementById('csvFile')?.click(); }
function processCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const lines = ev.target.result.split('\n').filter(l => l.trim());
    let count = 0;
    lines.slice(1).forEach(line => {
      const parts = line.split(',').map(p => p.replace(/^"|"$/g, '').trim());
      if (parts.length >= 4) {
        const [date, typeStr, cat, amt, note = ''] = parts;
        const type = typeStr.includes('รับ') ? 'income' : 'expense';
        const amount = parseFloat(amt);
        if (date && amount > 0) { app.transactions.push({ id: Date.now() + count, type, amount, category: cat || 'อื่นๆ', date, note }); count++; }
      }
    });
    save();
    toast(`นำเข้า ${count} รายการ`, 'success');
    renderPage(app.page);
  };
  reader.readAsText(file, 'UTF-8');
}

function clearData() {
  if (!confirm('ล้างข้อมูลทั้งหมด?')) return;
  app.transactions = [];
  save();
  pushAllToGS();
  toast('ล้างข้อมูลเรียบร้อย', 'success');
  renderPage('overview');
}
