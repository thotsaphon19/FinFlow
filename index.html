<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinFlow 🌸 — ระบบบัญชีรายรับรายจ่าย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ─── Reset & Base ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Mitr','Sarabun',sans-serif;
  --sidebar-w:230px;
  --topbar-h:62px;

  /* 🌸 Cute Pastel Brand */
  --brand:#ff6b9d;
  --brand2:#a78bfa;
  --brand3:#38bdf8;
  --brand-light:#fff0f6;
  --brand-dark:#e8457a;
  --brand-glow:rgba(255,107,157,.2);

  /* Semantic */
  --income:#10b981;
  --income-bg:#d1fae5;
  --expense:#f43f5e;
  --expense-bg:#ffe4e6;
  --warning:#f59e0b;
  --warning-bg:#fef3c7;

  /* Surfaces */
  --bg:linear-gradient(135deg,#fdf2f8 0%,#faf5ff 50%,#eff6ff 100%);
  --bg-solid:#fdf2f8;
  --surface:#ffffff;
  --surface2:#fdf9ff;
  --sidebar-bg:linear-gradient(180deg,#2d1b69 0%,#1e1245 60%,#12082e 100%);
  --sidebar-hover:rgba(255,255,255,.08);
  --sidebar-active:rgba(255,107,157,.25);

  /* Text */
  --text:#2d1b69;
  --text-2:#6b46a0;
  --text-3:#a78bcc;
  --text-inv:#ffffff;

  /* Borders */
  --border:rgba(167,139,250,.15);
  --border-2:rgba(167,139,250,.25);

  /* Radius & Shadow */
  --r-sm:10px;
  --r-md:14px;
  --r-lg:20px;
  --r-xl:24px;
  --shadow:0 2px 8px rgba(167,139,250,.1),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(167,139,250,.2),0 2px 8px rgba(0,0,0,.06);
  --shadow-pop:0 16px 40px rgba(255,107,157,.25),0 4px 12px rgba(0,0,0,.08);
}
[data-theme="dark"]{
  --bg-solid:#160d2e;
  --surface:#1e1245;
  --surface2:#251858;
  --text:#f0e8ff;
  --text-2:#c4b0e8;
  --text-3:#7c6aad;
  --border:rgba(167,139,250,.12);
  --border-2:rgba(167,139,250,.2);
  --brand-light:#2d1b69;
  --income-bg:#064e3b;
  --expense-bg:#4c0519;
  --warning-bg:#451a03;
  --shadow:0 2px 8px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}
html,body{height:100%}
body{
  font-family:var(--font);
  background:var(--bg-solid);
  background-image:var(--bg);
  background-attachment:fixed;
  color:var(--text);
  font-size:14px;
  line-height:1.6;
  transition:background .3s,color .3s;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.hidden{display:none!important}

/* ─── Decorative blobs ──────────────────────────── */
body::before{
  content:'';
  position:fixed;top:-200px;right:-200px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(255,107,157,.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';
  position:fixed;bottom:-150px;left:-150px;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(56,189,248,.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ─── Login ─────────────────────────────────────── */
#loginPage{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:var(--sidebar-bg);
  position:relative;overflow:hidden;
}
#loginPage::before{
  content:'🌸 💖 ✨ 🌺 💕 🌸 ✨ 💖 🌺';
  position:absolute;top:0;left:0;right:0;
  font-size:22px;letter-spacing:18px;
  padding:1rem;opacity:.15;
  white-space:nowrap;overflow:hidden;
  animation:float 3s ease-in-out infinite;
}
.login-card{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-xl);
  padding:2.75rem 2.25rem;
  width:380px;
  backdrop-filter:blur(24px);
  position:relative;z-index:1;
  box-shadow:0 24px 64px rgba(0,0,0,.3);
  animation:pop .4s ease forwards;
}
.login-brand{text-align:center;margin-bottom:2rem}
.login-brand .logo-icon{
  width:68px;height:68px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:20px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;color:#fff;margin-bottom:.875rem;
  box-shadow:0 12px 32px rgba(255,107,157,.45);
  animation:float 3s ease-in-out infinite;
}
.login-brand h1{color:#fff;font-size:24px;font-weight:600;letter-spacing:-.3px}
.login-brand p{color:rgba(255,255,255,.45);font-size:13px;margin-top:4px}
.login-field{margin-bottom:1rem}
.login-field label{display:block;color:rgba(255,255,255,.5);font-size:11px;font-weight:500;margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase}
.login-field input{
  width:100%;padding:.65rem .9rem;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r-sm);color:#fff;
  font-size:14px;font-family:var(--font);
  transition:border-color .2s,background .2s;outline:none;
}
.login-field input:focus{border-color:var(--brand);background:rgba(255,107,157,.12)}
.login-field input::placeholder{color:rgba(255,255,255,.2)}
.login-btn-wrap{margin-top:1.5rem}
.btn-login{
  width:100%;padding:.75rem;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border:none;border-radius:var(--r-sm);
  font-size:15px;font-weight:600;font-family:var(--font);
  cursor:pointer;transition:transform .15s,box-shadow .2s;
  box-shadow:0 6px 20px rgba(255,107,157,.4);
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,107,157,.5)}
.btn-login:active{transform:scale(.97)}
.login-hint{color:rgba(255,255,255,.22);font-size:11px;text-align:center;margin-top:.875rem}
.login-error{
  background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);
  color:#fda4b5;border-radius:var(--r-sm);
  padding:.5rem .75rem;font-size:12px;margin-top:.75rem;display:none;
}

/* ─── App Layout ────────────────────────────────── */
#appPage{display:none;min-height:100vh;position:relative;z-index:1}
.layout{display:flex;min-height:100vh}

/* ─── Sidebar ───────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);
  background:var(--sidebar-bg);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;transition:transform .3s;
  box-shadow:4px 0 20px rgba(0,0,0,.15);
}
.sidebar-logo{
  padding:1.375rem 1.375rem 1rem;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.07);
  margin-bottom:.5rem;
}
.sidebar-logo .icon{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:19px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(255,107,157,.35);
}
.sidebar-logo span{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.2px}
.sidebar-logo small{color:rgba(255,255,255,.3);font-size:10px;display:block;margin-top:-2px}
.nav-section{padding:.375rem 0}
.nav-label{color:rgba(255,255,255,.2);font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:.6rem 1.375rem .3rem}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:.6rem 1.375rem;
  color:rgba(255,255,255,.45);cursor:pointer;font-size:13px;
  transition:all .18s;border-left:3px solid transparent;
  user-select:none;
}
.nav-item i{font-size:16px;width:18px;text-align:center}
.nav-item:hover{color:rgba(255,255,255,.85);background:var(--sidebar-hover)}
.nav-item.active{color:#fff;background:var(--sidebar-active);border-left-color:var(--brand)}
.nav-item .nav-emoji{font-size:15px}
.sidebar-footer{
  margin-top:auto;padding:1rem 1.375rem;
  border-top:1px solid rgba(255,255,255,.07);
}
.user-row{display:flex;align-items:center;gap:8px}
.user-avatar{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:600;flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{color:rgba(255,255,255,.85);font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{color:rgba(255,255,255,.3);font-size:10px}
.btn-logout{color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s}
.btn-logout:hover{color:rgba(255,255,255,.7)}

/* ─── Main ──────────────────────────────────────── */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  height:var(--topbar-h);
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 12px rgba(167,139,250,.08);
}
[data-theme="dark"] .topbar{background:rgba(30,18,69,.85)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left h1{font-size:16px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{padding:1.5rem;flex:1;animation:fadeUp .35s ease forwards}

/* ─── Buttons ───────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:.45rem .9rem;
  border-radius:var(--r-sm);
  border:1px solid var(--border-2);
  background:var(--surface);color:var(--text-2);
  font-size:12px;font-weight:500;font-family:var(--font);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.btn i{font-size:14px}
.btn:hover{background:var(--brand-light);border-color:var(--brand);color:var(--brand)}
.btn-primary{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border:none;
  box-shadow:0 4px 12px rgba(255,107,157,.3);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,107,157,.4);color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2))}
.btn-success{background:var(--income);color:#fff;border-color:var(--income)}
.btn-success:hover{background:#047857;color:#fff}
.btn-danger{background:var(--expense);color:#fff;border-color:var(--expense)}
.btn-danger:hover{background:#be123c;color:#fff}
.btn-sm{padding:.3rem .65rem;font-size:11px}
.btn-icon{padding:.4rem;border-radius:var(--r-sm)}

/* ─── Cards ─────────────────────────────────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.875rem 1.25rem;
  border-bottom:1px solid var(--border);
}
.card-header h3{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.card-body{padding:1.25rem}

/* ─── Stats Grid ─────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem}
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:1.125rem;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.stat-card::after{
  content:'';position:absolute;
  width:80px;height:80px;border-radius:50%;
  bottom:-20px;right:-20px;opacity:.08;
}
.stat-card.income-card::after{background:var(--income)}
.stat-card.expense-card::after{background:var(--expense)}
.stat-card.balance-card::after{background:var(--brand)}
.stat-card.count-card::after{background:var(--warning)}
.stat-card.income-card{border-top:3px solid var(--income)}
.stat-card.expense-card{border-top:3px solid var(--expense)}
.stat-card.balance-card{border-top:3px solid var(--brand)}
.stat-card.count-card{border-top:3px solid var(--warning)}
.stat-icon{
  width:36px;height:36px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;margin-bottom:.625rem;
}
.stat-icon.income{background:var(--income-bg);color:var(--income)}
.stat-icon.expense{background:var(--expense-bg);color:var(--expense)}
.stat-icon.balance{background:var(--brand-light);color:var(--brand)}
.stat-icon.count{background:var(--warning-bg);color:var(--warning)}
.stat-label{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:3px}
.stat-value{font-size:21px;font-weight:600;line-height:1.2}
.stat-value.income{color:var(--income)}
.stat-value.expense{color:var(--expense)}
.stat-value.balance{color:var(--brand)}
.stat-value.neutral{color:var(--text)}
.stat-sub{font-size:10px;color:var(--text-3);margin-top:3px}

/* ─── Charts ─────────────────────────────────────── */
.chart-row{display:grid;grid-template-columns:1.85fr 1fr;gap:12px;margin-bottom:1.25rem}
.chart-wrap{position:relative}

/* ─── Table ──────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  padding:.6rem 1rem;text-align:left;
  font-size:10px;font-weight:600;color:var(--text-3);
  text-transform:uppercase;letter-spacing:.7px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  white-space:nowrap;
}
tbody td{padding:.65rem 1rem;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--surface2)}
.amount-income{color:var(--income);font-weight:500}
.amount-expense{color:var(--expense);font-weight:500}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:99px;
  font-size:10px;font-weight:600;white-space:nowrap;
}
.badge-income{background:var(--income-bg);color:var(--income)}
.badge-expense{background:var(--expense-bg);color:var(--expense)}
.badge-balance{background:var(--brand-light);color:var(--brand)}
.tbl-actions{display:flex;gap:4px;align-items:center}
.action-btn{
  background:none;border:none;cursor:pointer;
  padding:4px 7px;border-radius:8px;
  color:var(--text-3);transition:all .18s;font-size:14px;
}
.action-btn:hover{background:var(--brand-light);color:var(--brand)}
.action-btn.danger:hover{background:var(--expense-bg);color:var(--expense)}

/* ─── Slip thumbnail in table ─────────────────────── */
.slip-thumb{
  width:36px;height:36px;border-radius:8px;
  object-fit:cover;border:1px solid var(--border-2);
  cursor:pointer;transition:transform .2s;
}
.slip-thumb:hover{transform:scale(1.1)}
.slip-load-btn{
  background:var(--brand-light);color:var(--brand);
  border:1px solid var(--brand);border-radius:8px;
  padding:3px 10px;font-size:11px;cursor:pointer;
  font-family:var(--font);transition:all .18s;white-space:nowrap;
}
.slip-load-btn:hover{background:var(--brand);color:#fff}
.slip-load-btn:disabled{opacity:.5;cursor:not-allowed}
.no-slip{color:var(--text-3);font-size:11px}

/* ─── Image lightbox ─────────────────────────────── */
#lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:9998;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
  padding:1.5rem;
}
#lightbox.open{display:flex}
#lightbox .lb-close{
  position:absolute;top:1.25rem;right:1.25rem;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  width:40px;height:40px;border-radius:50%;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;z-index:1;
}
#lightbox .lb-close:hover{background:rgba(255,255,255,.28)}

/* ─── Filters ────────────────────────────────────── */
.filter-bar{
  display:flex;gap:8px;padding:.75rem 1rem;
  background:var(--surface2);border-bottom:1px solid var(--border);
  flex-wrap:wrap;align-items:center;
}
.filter-bar select,.filter-bar input[type="text"]{
  padding:.375rem .75rem;border-radius:var(--r-sm);
  border:1px solid var(--border-2);
  background:var(--surface);color:var(--text);
  font-size:12px;font-family:var(--font);
  outline:none;transition:border-color .2s;
}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--brand)}
.filter-bar input[type="text"]{min-width:160px;flex:1}
.tbl-summary{
  display:flex;gap:1.25rem;padding:.65rem 1rem;
  border-top:1px solid var(--border);background:var(--surface2);
  font-size:12px;color:var(--text-2);flex-wrap:wrap;
}
.tbl-summary strong{font-weight:600}

/* ─── Form ───────────────────────────────────────── */
.type-toggle{display:flex;gap:8px;margin-bottom:1.25rem}
.type-btn{
  flex:1;padding:.6rem;border-radius:var(--r-sm);
  border:1.5px solid var(--border-2);background:transparent;
  color:var(--text-2);font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.type-btn.sel-income{background:var(--income-bg);border-color:var(--income);color:var(--income)}
.type-btn.sel-expense{background:var(--expense-bg);border-color:var(--expense);color:var(--expense)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{
  padding:.5rem .75rem;border-radius:var(--r-sm);
  border:1px solid var(--border-2);
  background:var(--surface2);color:var(--text);
  font-size:13px;font-family:var(--font);
  outline:none;transition:border-color .2s,background .2s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--brand);background:var(--surface);
}
.form-actions{display:flex;gap:8px;flex-wrap:wrap}
.form-full{grid-column:1/-1}

/* ─── Slip upload area ───────────────────────────── */
.slip-upload-area{
  border:2px dashed var(--border-2);
  border-radius:var(--r-md);
  padding:1.25rem;text-align:center;
  cursor:pointer;transition:all .2s;
  background:var(--surface2);
  position:relative;
}
.slip-upload-area:hover{border-color:var(--brand);background:var(--brand-light)}
.slip-upload-area.has-img{border-style:solid;border-color:var(--brand)}
.slip-upload-area .slip-preview{
  width:100%;max-height:160px;object-fit:contain;
  border-radius:var(--r-sm);margin-top:.5rem;
}
.slip-upload-area .upload-hint{color:var(--text-3);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:6px}
.slip-upload-area .upload-hint i{font-size:28px;color:var(--text-3)}
.slip-remove-btn{
  position:absolute;top:8px;right:8px;
  background:rgba(244,63,94,.9);color:#fff;
  border:none;border-radius:50%;width:24px;height:24px;
  font-size:12px;cursor:pointer;display:none;
  align-items:center;justify-content:center;
}
.slip-upload-area.has-img .slip-remove-btn{display:flex}

/* ─── Category Manager ──────────────────────────── */
.cat-tabs{display:flex;gap:6px;margin-bottom:1.25rem}
.cat-tab{
  padding:.4rem .875rem;border-radius:99px;
  border:1.5px solid var(--border-2);background:transparent;
  color:var(--text-2);font-family:var(--font);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;
}
.cat-tab.active{
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 12px rgba(255,107,157,.3);
}
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-item{
  display:flex;align-items:center;gap:10px;
  padding:.75rem 1rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-md);
  transition:all .18s;
}
.cat-item:hover{border-color:var(--brand);box-shadow:0 2px 8px rgba(255,107,157,.1)}
.cat-emoji{font-size:20px;flex-shrink:0}
.cat-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.cat-add-form{
  display:flex;gap:8px;margin-top:1rem;align-items:center;flex-wrap:wrap;
}
.cat-add-form input{
  padding:.5rem .75rem;border-radius:var(--r-sm);
  border:1px solid var(--border-2);background:var(--surface);
  color:var(--text);font-size:13px;font-family:var(--font);
  outline:none;transition:border-color .2s;
}
.cat-add-form input:focus{border-color:var(--brand)}
.cat-add-form input.cat-emoji-input{width:80px}
.cat-add-form input.cat-name-input{flex:1;min-width:120px}
.cat-sync-status{
  font-size:11px;padding:.35rem .75rem;border-radius:99px;
  display:inline-flex;align-items:center;gap:5px;
}
.cat-sync-status.syncing{background:var(--warning-bg);color:var(--warning)}
.cat-sync-status.synced{background:var(--income-bg);color:var(--income)}
.cat-sync-status.error{background:var(--expense-bg);color:var(--expense)}

/* ─── Report Periods ─────────────────────────────── */
.period-tabs{display:flex;gap:6px;margin-bottom:1.125rem;flex-wrap:wrap}
.period-tab{
  padding:.4rem .875rem;border-radius:99px;
  border:1px solid var(--border-2);background:transparent;
  color:var(--text-2);font-family:var(--font);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;
}
.period-tab.active{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent;color:#fff}
.period-tab:hover:not(.active){background:var(--brand-light);border-color:var(--brand);color:var(--brand)}

/* ─── Settings ───────────────────────────────────── */
.settings-grid{display:flex;flex-direction:column;gap:1rem}
.setting-row{display:flex;align-items:center;gap:12px;padding-bottom:.875rem;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none;padding-bottom:0}
.setting-label{font-size:12px;font-weight:600;color:var(--text-2);width:130px;flex-shrink:0}
.setting-desc{font-size:11px;color:var(--text-3);margin-top:2px}
.setting-input{flex:1}
.setting-input input{
  width:100%;padding:.45rem .75rem;border-radius:var(--r-sm);
  border:1px solid var(--border-2);background:var(--surface2);
  color:var(--text);font-size:13px;font-family:var(--font);outline:none;
}
.setting-input input:focus{border-color:var(--brand)}
.sync-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.sync-ok{background:var(--income-bg);color:var(--income)}
.sync-err{background:var(--expense-bg);color:var(--expense)}
.toggle{position:relative;display:inline-block;width:38px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:var(--border-2);border-radius:99px;cursor:pointer;transition:.2s;
}
.toggle-slider::before{
  content:'';position:absolute;
  width:16px;height:16px;background:#fff;border-radius:50%;
  left:3px;top:3px;transition:.2s;
}
.toggle input:checked+.toggle-slider{background:var(--brand)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}

/* ─── Empty State ────────────────────────────────── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-3)}
.empty-state .empty-emoji{font-size:48px;display:block;margin-bottom:.75rem;animation:float 3s ease-in-out infinite}
.empty-state p{font-size:13px}

/* ─── Toast ──────────────────────────────────────── */
#toastWrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{
  background:var(--surface);color:var(--text);
  padding:.65rem 1.1rem;border-radius:var(--r-md);
  font-size:13px;display:flex;align-items:center;gap:8px;
  box-shadow:var(--shadow-md);
  animation:toastIn .3s ease;max-width:300px;
  border:1px solid var(--border-2);
}
.toast.success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none}
.toast.error{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;border:none}

/* ─── Responsive ─────────────────────────────────── */
@media (max-width:900px){
  :root{--sidebar-w:0px}
  .sidebar{transform:translateX(-230px);width:230px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .chart-row{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
@media (max-width:600px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .content{padding:1rem}
  .topbar{padding:0 1rem}
}
@media print{
  .sidebar,.topbar,.btn,.filter-bar,.tbl-actions,.form-actions,.period-tabs{display:none!important}
  .main{margin-left:0}
  .content{padding:0}
}
</style>

<script>
/* ══════════════════════════════════════════════════
   DATA & STATE
══════════════════════════════════════════════════ */
const USERS = [
  { u:'demo', p:'1234', name:'สมชาย ใจดี' },
  { u:'admin', p:'admin', name:'ผู้ดูแลระบบ' }
];

// Default categories (used if no GS)
const DEFAULT_CATS = {
  income: [
    {emoji:'💰',name:'เงินเดือน'},
    {emoji:'🏢',name:'ธุรกิจ'},
    {emoji:'📈',name:'การลงทุน'},
    {emoji:'🎁',name:'โบนัส'},
    {emoji:'💻',name:'ฟรีแลนซ์'},
    {emoji:'✨',name:'รายได้อื่นๆ'},
  ],
  expense: [
    {emoji:'🍜',name:'อาหาร & เครื่องดื่ม'},
    {emoji:'🏠',name:'ที่พัก'},
    {emoji:'🚗',name:'เดินทาง'},
    {emoji:'💊',name:'สุขภาพ'},
    {emoji:'🛍️',name:'ช้อปปิ้ง'},
    {emoji:'🎉',name:'บันเทิง'},
    {emoji:'💡',name:'ค่าสาธารณูปโภค'},
    {emoji:'📚',name:'การศึกษา'},
    {emoji:'🛡️',name:'ประกันภัย'},
    {emoji:'🌸',name:'อื่นๆ'},
  ]
};
const PALETTE = ['#ff6b9d','#a78bfa','#38bdf8','#10b981','#f59e0b','#f43f5e','#8b5cf6','#0ea5e9','#06b6d4','#6366f1'];

let app = {
  loggedIn:false,user:null,page:'overview',
  transactions:[],
  formType:'expense',editId:null,
  reportPeriod:'monthly',
  gs:{webAppUrl:'',enabled:false},
  filter:{type:'all',year:'all',month:'all',search:''},
  charts:{},
  categories:{income:[...DEFAULT_CATS.income],expense:[...DEFAULT_CATS.expense]},
  catEditType:'expense',
};

/* ══════════════════════════════════════════════════
   PERSIST
══════════════════════════════════════════════════ */
function save(){
  try{localStorage.setItem('ff_txns',JSON.stringify(app.transactions))}catch(e){}
  try{localStorage.setItem('ff_gs',JSON.stringify(app.gs))}catch(e){}
  try{localStorage.setItem('ff_cats',JSON.stringify(app.categories))}catch(e){}
}
async function load(){
  const hashParams=new URLSearchParams(window.location.hash.slice(1));
  const urlFromHash=hashParams.get('gs');
  if(urlFromHash){
    app.gs.webAppUrl=urlFromHash;app.gs.enabled=true;
    try{localStorage.setItem('ff_gs',JSON.stringify(app.gs))}catch(e){}
  } else {
    try{const d=localStorage.getItem('ff_gs');if(d)app.gs={...app.gs,...JSON.parse(d)}}catch(e){}
  }

  // Load local categories first
  try{const d=localStorage.getItem('ff_cats');if(d){const c=JSON.parse(d);if(c.income&&c.expense)app.categories=c}}catch(e){}

  if(app.gs.enabled&&app.gs.webAppUrl){
    showLoadingOverlay(true);
    const ok=await pullFromGS();
    // Also try to pull categories from GS
    await pullCatsFromGS();
    showLoadingOverlay(false);
    if(!ok){
      try{const d=localStorage.getItem('ff_txns');if(d)app.transactions=JSON.parse(d)}catch(e){}
      toast('ดึงข้อมูลจาก Google Sheet ไม่ได้ — ใช้ข้อมูลในเครื่องแทน','error');
    }
  } else {
    const initialized=localStorage.getItem('ff_initialized');
    if(!initialized){
      localStorage.removeItem('ff_txns');
      localStorage.setItem('ff_initialized','1');
      app.transactions=[];
    } else {
      try{const d=localStorage.getItem('ff_txns');if(d)app.transactions=JSON.parse(d)}catch(e){}
    }
  }
}

function showLoadingOverlay(show){
  let el=document.getElementById('gsLoadingOverlay');
  if(show){
    if(!el){
      el=document.createElement('div');el.id='gsLoadingOverlay';
      el.style.cssText='position:fixed;inset:0;background:var(--bg-solid);background-image:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px';
      el.innerHTML='<div style="font-size:42px;animation:float 1s ease-in-out infinite">🌸</div><div style="width:36px;height:36px;border:3px solid rgba(255,107,157,.3);border-top-color:#ff6b9d;border-radius:50%;animation:spin .7s linear infinite"></div><p style="color:var(--text-2);font-size:13px">กำลังโหลดข้อมูล…</p>';
      document.body.appendChild(el);
    }
    el.style.display='flex';
  } else {
    if(el)el.remove();
  }
}

/* ══════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════ */
const now=()=>new Date();
function fmtDateInput(d){return d.toISOString().slice(0,10)}
function fmtDate(d){return new Date(d).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'})}
function fmtMoney(n){return new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n)}
function fmtMoneyShort(n){
  if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M';
  if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'k';
  return Math.round(n).toString();
}
function getMonthTxns(y,m){
  return app.transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m});
}
function sumType(txns,type){return txns.filter(t=>t.type===type).reduce((s,t)=>s+t.amount,0)}
function destroyCharts(){Object.values(app.charts).forEach(c=>{try{c.destroy()}catch(e){}});app.charts={}}
function getCatNames(type){return app.categories[type].map(c=>c.name)}
function getCatEmoji(type,name){
  const c=app.categories[type].find(c=>c.name===name);
  return c?c.emoji:'🌸';
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function toast(msg,type=''){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const emoji=type==='success'?'✅':type==='error'?'❌':'💬';
  el.innerHTML=`${emoji} ${msg}`;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

/* ══════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════ */
function openLightbox(src, txn){
  const img=document.getElementById('lightboxImg');
  const info=document.getElementById('lightboxInfo');
  const dl=document.getElementById('lightboxDownload');
  img.src=src;
  dl.href=src;
  dl.download=(txn?`slip_${txn.date}_${txn.category}`:'slip')+'.jpg';
  if(txn&&info){
    info.style.display='flex';
    info.innerHTML=`
      <span>${getCatEmoji(txn.type,txn.category)} <strong>${txn.category}</strong></span>
      <span>📅 ${fmtDate(txn.date)}</span>
      <span style="color:${txn.type==='income'?'#6ee7b7':'#fda4af'};font-weight:600">฿${fmtMoney(txn.amount)}</span>
      ${txn.note?`<span style="color:rgba(255,255,255,.6)">📝 ${txn.note}</span>`:''}
    `;
  } else if(info){
    info.style.display='none';
  }
  document.getElementById('lightbox').classList.add('open');
}
function openLightboxById(idStr){
  const id=Number(idStr);
  const txn=app.transactions.find(t=>t.id===id);
  if(txn&&txn.slipImg)openLightbox(txn.slipImg,txn);
}

// ── สร้าง HTML สำหรับเซลล์สลิปในตาราง ──────────────
// - มีรูป → แสดง thumbnail
// - GS บอกมีสลิปแต่ยังไม่โหลด (_hasSlip ถูกลบไปแล้วหลัง pull แต่ slipImg=null) 
//   → ตรวจจาก flag _slipPending ที่ set ตอน rowToTxn
// - ไม่มีทั้งคู่ → "—"
function slipCell(t){
  if(t.slipImg){
    return `<img class="slip-thumb" src="${t.slipImg}" data-txnid="${t.id}" onclick="openLightboxById(this.dataset.txnid)" alt="สลิป">`;
  }
  if(t._slipPending){
    return `<button class="slip-load-btn" data-txnid="${t.id}" onclick="loadSlipInline(this)">📎 โหลด</button>`;
  }
  return `<span class="no-slip">—</span>`;
}

// ── โหลดสลิปของรายการเดียวจาก GS แล้วแสดงทันที ─────
async function loadSlipInline(btn){
  const id=Number(btn.dataset.txnid);
  const txn=app.transactions.find(t=>t.id===id);
  if(!txn)return;
  btn.textContent='⏳';btn.disabled=true;
  const res=await gsRequest({action:'readSlip',id:txn.id});
  if(res&&res.data){
    txn.slipImg=res.data;
    txn._slipPending=false;
    save();
    // แทนที่ปุ่มด้วย thumbnail ทันที
    const td=btn.parentElement;
    td.innerHTML=`<img class="slip-thumb" src="${txn.slipImg}" data-txnid="${txn.id}" onclick="openLightboxById(this.dataset.txnid)" alt="สลิป">`;
  } else {
    btn.textContent='❌';
    setTimeout(()=>{btn.textContent='📎 โหลด';btn.disabled=false;},2000);
  }
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open')}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this||e.target.id==='lightbox')closeLightbox()});

/* ══════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════ */
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const found=USERS.find(x=>x.u===u&&x.p===p);
  if(found){
    app.loggedIn=true;app.user=found;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appPage').style.display='block';
    document.getElementById('sidebarName').textContent=found.name;
    document.getElementById('sidebarAvatar').textContent=found.name.charAt(0);
    load().then(()=>renderPage('overview'));
  } else {
    document.getElementById('loginError').style.display='block';
  }
}
function doLogout(){
  app.loggedIn=false;
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('appPage').style.display='none';
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

/* ══════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════ */
const PAGE_TITLES={overview:'🏠 ภาพรวม',add:'✨ เพิ่มรายการ',transactions:'📋 รายการทั้งหมด',reports:'📊 รายงาน',categories:'🏷️ หมวดหมู่',settings:'⚙️ ตั้งค่า'};
function renderPage(page){
  destroyCharts();app.page=page;
  document.getElementById('pageTitle').textContent=PAGE_TITLES[page]||page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const exportBtns=['transactions','reports','overview'];
  document.getElementById('exportExcelBtn').style.display=exportBtns.includes(page)?'':'none';
  document.getElementById('exportPdfBtn').style.display=exportBtns.includes(page)?'':'none';
  const pages={overview:renderOverview,add:renderAdd,transactions:renderTransactions,reports:renderReports,categories:renderCategories,settings:renderSettings};
  (pages[page]||renderOverview)();
}
document.querySelectorAll('.nav-item').forEach(el=>el.addEventListener('click',()=>{app.editId=null;renderPage(el.dataset.page)}));
function goAddNew(){app.editId=null;renderPage('add')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function toggleTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme',html.getAttribute('data-theme')==='dark'?'':'dark');
}

/* ══════════════════════════════════════════════════
   OVERVIEW
══════════════════════════════════════════════════ */
function renderOverview(){
  const n=now();
  const mt=getMonthTxns(n.getFullYear(),n.getMonth());
  const inc=sumType(mt,'income'),exp=sumType(mt,'expense'),bal=inc-exp;
  const recent=app.transactions.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,7);
  const months=[],incData=[],expData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(n.getFullYear(),n.getMonth()-i,1);
    months.push(d.toLocaleDateString('th-TH',{month:'short'}));
    const txns=getMonthTxns(d.getFullYear(),d.getMonth());
    incData.push(Math.round(sumType(txns,'income')));expData.push(Math.round(sumType(txns,'expense')));
  }
  const catMap={};
  mt.filter(t=>t.type==='expense').forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});
  const catKeys=Object.keys(catMap),catVals=catKeys.map(k=>Math.round(catMap[k]));

  document.getElementById('pageContent').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card income-card">
        <div class="stat-icon income"><i class="ti ti-trending-up"></i></div>
        <div class="stat-label">รายรับเดือนนี้</div>
        <div class="stat-value income">฿${fmtMoney(inc)}</div>
        <div class="stat-sub">💚 เดือน${n.toLocaleDateString('th-TH',{month:'long'})}</div>
      </div>
      <div class="stat-card expense-card">
        <div class="stat-icon expense"><i class="ti ti-trending-down"></i></div>
        <div class="stat-label">รายจ่ายเดือนนี้</div>
        <div class="stat-value expense">฿${fmtMoney(exp)}</div>
        <div class="stat-sub">❤️ เดือน${n.toLocaleDateString('th-TH',{month:'long'})}</div>
      </div>
      <div class="stat-card balance-card">
        <div class="stat-icon balance"><i class="ti ti-wallet"></i></div>
        <div class="stat-label">คงเหลือเดือนนี้</div>
        <div class="stat-value balance">฿${fmtMoney(bal)}</div>
        <div class="stat-sub">${bal>=0?'✨ มีเงินเหลือ':'⚠️ รายจ่ายเกิน'}</div>
      </div>
      <div class="stat-card count-card">
        <div class="stat-icon count"><i class="ti ti-receipt"></i></div>
        <div class="stat-label">รายการทั้งหมด</div>
        <div class="stat-value neutral">${app.transactions.length}</div>
        <div class="stat-sub">🌸 รายการสะสม</div>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <div class="card-header"><h3>📊 รายรับ-รายจ่าย 6 เดือนล่าสุด</h3></div>
        <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="barChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>🍩 สัดส่วนรายจ่าย</h3></div>
        <div class="card-body"><div class="chart-wrap" style="height:200px"><canvas id="donutChart"></canvas></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>⚡ รายการล่าสุด</h3>
        <button class="btn btn-sm" onclick="renderPage('transactions')">ดูทั้งหมด <i class="ti ti-arrow-right"></i></button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th><th>สลิป</th><th style="text-align:right">จำนวน</th></tr></thead>
          <tbody>${recent.map(t=>`<tr>
            <td>${fmtDate(t.date)}</td>
            <td><span class="badge badge-${t.type}">${t.type==='income'?'💚 รายรับ':'❤️ รายจ่าย'}</span></td>
            <td>${getCatEmoji(t.type,t.category)} ${t.category}</td>
            <td style="color:var(--text-3);font-size:12px">${t.note||'—'}</td>
            <td>${slipCell(t)}</td>
            <td class="amount-${t.type}" style="text-align:right">฿${fmtMoney(t.amount)}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;

  app.charts.bar=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{
      labels:months,
      datasets:[
        {label:'รายรับ',data:incData,backgroundColor:'#10b981',borderRadius:6,borderSkipped:false},
        {label:'รายจ่าย',data:expData,backgroundColor:'#f43f5e',borderRadius:6,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:10,font:{size:11}}}},
      scales:{
        y:{ticks:{callback:v=>fmtMoneyShort(v),font:{size:10}},grid:{color:'rgba(128,128,128,.08)'}},
        x:{grid:{display:false},ticks:{font:{size:10}}}
      }
    }
  });
  if(catKeys.length){
    app.charts.donut=new Chart(document.getElementById('donutChart'),{
      type:'doughnut',
      data:{labels:catKeys.map(k=>getCatEmoji('expense',k)+' '+k),datasets:[{data:catVals,backgroundColor:PALETTE,borderWidth:0}]},

/* ══════════════════════════════════════════════════
   ADD / EDIT (with slip image upload)
══════════════════════════════════════════════════ */
let pendingSlipBase64=null;

function renderAdd(){
  const edit=app.editId?app.transactions.find(t=>t.id===app.editId):null;
  const ft=edit?edit.type:app.formType;
  pendingSlipBase64=edit?edit.slipImg||null:null;
  const slipHtml=`<div class="slip-upload-area ${pendingSlipBase64?'has-img':''}" id="slipDropArea" onclick="document.getElementById('slipFileInput').click()">
    ${pendingSlipBase64
      ?`<img class="slip-preview" src="${pendingSlipBase64}" id="slipPreviewImg" alt="สลิป">
         <button class="slip-remove-btn" id="slipRemoveBtn" onclick="removeSlip(event)"><i class="ti ti-x"></i></button>`
      :`<div class="upload-hint"><i class="ti ti-camera"></i><span>📸 แนบสลิป / รูปการจ่ายเงิน</span><span style="font-size:11px;color:var(--text-3)">คลิก หรือลากไฟล์มาวาง</span></div>`}
  </div>
  <input type="file" id="slipFileInput" accept="image/*" style="display:none" onchange="handleSlipFile(event)">`;

  document.getElementById('pageContent').innerHTML=`
    <div class="card" style="max-width:640px">
      <div class="card-header">
        <h3>${edit?'✏️ แก้ไขรายการ':'✨ เพิ่มรายการใหม่'}</h3>
      </div>
      <div class="card-body">
        <div class="type-toggle">
          <button class="type-btn ${ft==='income'?'sel-income':''}" id="btnIncome" onclick="setType('income')">💚 + รายรับ</button>
          <button class="type-btn ${ft==='expense'?'sel-expense':''}" id="btnExpense" onclick="setType('expense')">❤️ - รายจ่าย</button>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>💵 จำนวนเงิน (บาท)</label>
            <input type="number" id="fAmt" placeholder="0.00" value="${edit?edit.amount.toFixed(2):''}" min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>📅 วันที่</label>
            <input type="date" id="fDate" value="${edit?edit.date:fmtDateInput(now())}">
          </div>
          <div class="form-group">
            <label>🏷️ หมวดหมู่</label>
            <select id="fCat">${getCatNames(ft).map(c=>`<option ${edit&&edit.category===c?'selected':''}>${c}</option>`).join('')}</select>
          </div>
          <div class="form-group">
            <label>📝 หมายเหตุ</label>
            <input id="fNote" placeholder="(ไม่บังคับ)" value="${edit?edit.note:''}">
          </div>
          <div class="form-group form-full">
            <label>🧾 สลิป / หลักฐาน</label>
            ${slipHtml}
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveEntry()">💾 ${edit?'บันทึกการแก้ไข':'บันทึกรายการ'}</button>
          ${edit?`<button class="btn" onclick="app.editId=null;renderPage('add')">❌ ยกเลิก</button>`:''}
        </div>
      </div>
    </div>`;

  // Setup drag-drop
  const dropArea=document.getElementById('slipDropArea');
  if(dropArea){
    dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.style.borderColor='var(--brand)'});
    dropArea.addEventListener('dragleave',()=>{dropArea.style.borderColor=''});
    dropArea.addEventListener('drop',e=>{e.preventDefault();dropArea.style.borderColor='';const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))processSlipFile(f)});
  }
}

function handleSlipFile(e){
  const f=e.target.files[0];if(!f)return;
  processSlipFile(f);
}
function processSlipFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingSlipBase64=ev.target.result;
    const area=document.getElementById('slipDropArea');
    if(area){
      area.classList.add('has-img');
      area.innerHTML=`<img class="slip-preview" src="${pendingSlipBase64}" id="slipPreviewImg" alt="สลิป">
        <button class="slip-remove-btn" id="slipRemoveBtn" onclick="removeSlip(event)"><i class="ti ti-x"></i></button>`;
    }
  };
  reader.readAsDataURL(file);
}
function removeSlip(e){
  e.stopPropagation();
  pendingSlipBase64=null;
  const area=document.getElementById('slipDropArea');
  if(area){
    area.classList.remove('has-img');
    area.innerHTML=`<div class="upload-hint"><i class="ti ti-camera"></i><span>📸 แนบสลิป / รูปการจ่ายเงิน</span><span style="font-size:11px;color:var(--text-3)">คลิก หรือลากไฟล์มาวาง</span></div>`;
  }
}

function setType(type){app.formType=type;app.editId=null;renderAdd()}

function saveEntry(){
  const amt=parseFloat(document.getElementById('fAmt').value);
  const date=document.getElementById('fDate').value;
  const cat=document.getElementById('fCat').value;
  const note=document.getElementById('fNote').value.trim();
  if(!amt||amt<=0){toast('กรุณากรอกจำนวนเงิน','error');return}
  if(!date){toast('กรุณาเลือกวันที่','error');return}
  let savedTxn;
  if(app.editId){
    const t=app.transactions.find(t=>t.id===app.editId);
    if(t){t.amount=amt;t.date=date;t.category=cat;t.note=note;t.type=app.formType;t.slipImg=pendingSlipBase64||null;savedTxn=t;}
    app.editId=null;toast('✅ แก้ไขรายการเรียบร้อย','success');
  } else {
    savedTxn={id:Date.now(),type:app.formType,amount:amt,category:cat,date,note,slipImg:pendingSlipBase64||null};
    app.transactions.push(savedTxn);
    toast('✅ บันทึกรายการเรียบร้อย','success');
  }
  pendingSlipBase64=null;
  save();
  // push ข้อมูลหลักก่อน แล้วค่อย push สลิปแยก
  pushAllToGS().then(()=>{
    if(savedTxn&&savedTxn.slipImg)pushSlipsToGS([savedTxn]);
  });
  renderAdd();
}

/* ══════════════════════════════════════════════════
   TRANSACTIONS
══════════════════════════════════════════════════ */
function renderTransactions(){
  const years=[...new Set(app.transactions.map(t=>new Date(t.date).getFullYear()))].sort((a,b)=>b-a);
  document.getElementById('pageContent').innerHTML=`
    <div class="card">
      <div class="filter-bar">
        <select id="ftType" onchange="applyFilter()">
          <option value="all">🌸 ทุกประเภท</option>
          <option value="income">💚 รายรับ</option>
          <option value="expense">❤️ รายจ่าย</option>
        </select>
        <select id="ftYear" onchange="applyFilter()">
          <option value="all">📅 ทุกปี</option>
          ${years.map(y=>`<option value="${y}">${y}</option>`).join('')}
        </select>
        <select id="ftMonth" onchange="applyFilter()">
          <option value="all">🗓️ ทุกเดือน</option>
          ${Array.from({length:12},(_,i)=>`<option value="${i}">${new Date(2000,i).toLocaleDateString('th-TH',{month:'long'})}</option>`).join('')}
        </select>
        <input type="text" id="ftSearch" placeholder="🔍 ค้นหาหมวด หรือหมายเหตุ…" oninput="applyFilter()">
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th><th>สลิป</th><th style="text-align:right">จำนวน</th><th></th></tr></thead>
          <tbody id="txnBody"></tbody>
        </table>
      </div>
      <div id="txnSummary" class="tbl-summary"></div>
    </div>`;
  document.getElementById('ftType').value=app.filter.type;
  document.getElementById('ftYear').value=app.filter.year;
  document.getElementById('ftMonth').value=app.filter.month;
  document.getElementById('ftSearch').value=app.filter.search;
  applyFilter();
}

function applyFilter(){
  if(document.getElementById('ftType')){
    app.filter.type=document.getElementById('ftType').value;
    app.filter.year=document.getElementById('ftYear').value;
    app.filter.month=document.getElementById('ftMonth').value;
    app.filter.search=document.getElementById('ftSearch').value.toLowerCase();
  }
  let txns=app.transactions.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(app.filter.type!=='all')txns=txns.filter(t=>t.type===app.filter.type);
  if(app.filter.year!=='all')txns=txns.filter(t=>new Date(t.date).getFullYear()===+app.filter.year);
  if(app.filter.month!=='all')txns=txns.filter(t=>new Date(t.date).getMonth()===+app.filter.month);
  if(app.filter.search)txns=txns.filter(t=>t.category.toLowerCase().includes(app.filter.search)||(t.note||'').toLowerCase().includes(app.filter.search));
  const body=document.getElementById('txnBody'),summary=document.getElementById('txnSummary');
  if(!body)return;
  const inc=sumType(txns,'income'),exp=sumType(txns,'expense');
  body.innerHTML=txns.length?txns.map(t=>`<tr>
    <td>${fmtDate(t.date)}</td>
    <td><span class="badge badge-${t.type}">${t.type==='income'?'💚 รายรับ':'❤️ รายจ่าย'}</span></td>
    <td>${getCatEmoji(t.type,t.category)} ${t.category}</td>
    <td style="color:var(--text-3);font-size:12px">${t.note||'—'}</td>
    <td>${slipCell(t)}</td>
    <td class="amount-${t.type}" style="text-align:right">฿${fmtMoney(t.amount)}</td>
    <td><div class="tbl-actions">
      <button class="action-btn" onclick="editTxn(${t.id})" title="แก้ไข">✏️</button>
      <button class="action-btn danger" onclick="delTxn(${t.id})" title="ลบ">🗑️</button>
    </div></td>
  </tr>`).join(''):`<tr><td colspan="7"><div class="empty-state"><span class="empty-emoji">🔍</span><p>ไม่พบรายการ</p></div></td></tr>`;
  summary.innerHTML=`แสดง <strong>${txns.length}</strong> รายการ &nbsp;·&nbsp; รายรับ <strong style="color:var(--income)">฿${fmtMoney(inc)}</strong> &nbsp;·&nbsp; รายจ่าย <strong style="color:var(--expense)">฿${fmtMoney(exp)}</strong> &nbsp;·&nbsp; คงเหลือ <strong style="color:var(--brand)">฿${fmtMoney(inc-exp)}</strong>`;
}
function editTxn(id){app.editId=id;app.formType=app.transactions.find(t=>t.id===id)?.type||'expense';renderPage('add')}
function delTxn(id){
  if(!confirm('🗑️ ลบรายการนี้?'))return;
  app.transactions=app.transactions.filter(t=>t.id!==id);
  save();pushAllToGS();toast('🗑️ ลบรายการแล้ว');applyFilter();
}

/* ══════════════════════════════════════════════════
   REPORTS
══════════════════════════════════════════════════ */
function renderReports(){
  document.getElementById('pageContent').innerHTML=`
    <div class="period-tabs">
      <button class="period-tab ${app.reportPeriod==='daily'?'active':''}" onclick="setReportPeriod('daily')">📅 รายวัน</button>
      <button class="period-tab ${app.reportPeriod==='monthly'?'active':''}" onclick="setReportPeriod('monthly')">🗓️ รายเดือน</button>
      <button class="period-tab ${app.reportPeriod==='yearly'?'active':''}" onclick="setReportPeriod('yearly')">📆 รายปี</button>
      <button class="period-tab ${app.reportPeriod==='all'?'active':''}" onclick="setReportPeriod('all')">🌸 ทั้งหมด</button>
    </div>
    <div id="reportInner"></div>`;
  buildReport();
}
function setReportPeriod(p){app.reportPeriod=p;renderReports()}
function buildReport(){
  const n=now();let rows=[];
  if(app.reportPeriod==='monthly'){
    for(let i=11;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);const txns=getMonthTxns(d.getFullYear(),d.getMonth());rows.push({label:d.toLocaleDateString('th-TH',{month:'short',year:'2-digit'}),inc:sumType(txns,'income'),exp:sumType(txns,'expense')})}
  } else if(app.reportPeriod==='yearly'){
    const years=[...new Set(app.transactions.map(t=>new Date(t.date).getFullYear()))].sort();
    years.forEach(y=>{const txns=app.transactions.filter(t=>new Date(t.date).getFullYear()===y);rows.push({label:String(y),inc:sumType(txns,'income'),exp:sumType(txns,'expense')})});
  } else if(app.reportPeriod==='daily'){
    for(let i=29;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);const ds=fmtDateInput(d);const txns=app.transactions.filter(t=>t.date===ds);if(txns.length)rows.push({label:d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'}),inc:sumType(txns,'income'),exp:sumType(txns,'expense')})}
  } else {
    rows=[{label:'ทั้งหมด',inc:sumType(app.transactions,'income'),exp:sumType(app.transactions,'expense')}];
  }
  const totalInc=rows.reduce((s,r)=>s+r.inc,0),totalExp=rows.reduce((s,r)=>s+r.exp,0);
  const wrap=document.getElementById('reportInner');
  wrap.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">
      <div class="stat-card income-card"><div class="stat-icon income"><i class="ti ti-trending-up"></i></div><div class="stat-label">รายรับรวม</div><div class="stat-value income">฿${fmtMoney(totalInc)}</div></div>
      <div class="stat-card expense-card"><div class="stat-icon expense"><i class="ti ti-trending-down"></i></div><div class="stat-label">รายจ่ายรวม</div><div class="stat-value expense">฿${fmtMoney(totalExp)}</div></div>
      <div class="stat-card balance-card"><div class="stat-icon balance"><i class="ti ti-wallet"></i></div><div class="stat-label">คงเหลือ</div><div class="stat-value balance">฿${fmtMoney(totalInc-totalExp)}</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-header"><h3>📈 กราฟแนวโน้ม</h3></div>
      <div class="card-body"><div class="chart-wrap" style="height:220px"><canvas id="reportChart"></canvas></div></div>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>ช่วงเวลา</th><th style="text-align:right">รายรับ</th><th style="text-align:right">รายจ่าย</th><th style="text-align:right">คงเหลือ</th><th style="text-align:right">%ออม</th></tr></thead>
          <tbody>${rows.map(r=>{const bal=r.inc-r.exp,savePct=r.inc>0?Math.round((bal/r.inc)*100):0;return`<tr><td>${r.label}</td><td class="amount-income" style="text-align:right">฿${fmtMoney(r.inc)}</td><td class="amount-expense" style="text-align:right">฿${fmtMoney(r.exp)}</td><td class="${bal>=0?'amount-income':'amount-expense'}" style="text-align:right">฿${fmtMoney(bal)}</td><td style="text-align:right;color:var(--text-2)">${r.inc>0?savePct+'%':'—'}</td></tr>`}).join('')}</tbody>
        </table>
      </div>
    </div>`;
  if(document.getElementById('reportChart')){
    app.charts.report=new Chart(document.getElementById('reportChart'),{
      type:'line',
      data:{
        labels:rows.map(r=>r.label),
        datasets:[
          {label:'รายรับ',data:rows.map(r=>Math.round(r.inc)),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',fill:true,tension:.35,pointRadius:3},
          {label:'รายจ่าย',data:rows.map(r=>Math.round(r.exp)),borderColor:'#f43f5e',backgroundColor:'rgba(244,63,94,.08)',fill:true,tension:.35,pointRadius:3}
        ]
      },
      options:{

function renderCatChart(){
  const n=now();
  const mt=app.transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&t.type==='expense'});
  const catMap={};mt.forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0);
  const body=document.getElementById('catChartBody');if(!body)return;
  body.innerHTML=sorted.length?sorted.map(([cat,amt],i)=>{
    const pct=total>0?Math.round((amt/total)*100):0;
    return`<div style="margin-bottom:.875rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">
        <span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:3px;background:${PALETTE[i%PALETTE.length]};display:inline-block"></span>${getCatEmoji('expense',cat)} ${cat}</span>
        <span style="color:var(--text-2)">฿${fmtMoney(amt)} <span style="color:var(--text-3)">(${pct}%)</span></span>
      </div>
      <div style="background:var(--border);border-radius:99px;height:8px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${PALETTE[i%PALETTE.length]};border-radius:99px;transition:width .6s"></div>
      </div>

  }).join(''):`<div class="empty-state"><span class="empty-emoji">📭</span><p>ไม่มีข้อมูลรายจ่ายเดือนนี้</p></div>`;
}

function addCat(){
  const emoji=(document.getElementById('newCatEmoji').value.trim()||'🌸');
  const name=document.getElementById('newCatName').value.trim();
  if(!name){toast('กรุณากรอกชื่อหมวดหมู่','error');return}
  const type=app.catEditType;
  if(app.categories[type].find(c=>c.name===name)){toast('มีหมวดหมู่นี้แล้ว','error');return}
  app.categories[type].push({emoji,name});
  save();pushCatsToGS();
  toast(`✅ เพิ่มหมวดหมู่ "${name}" แล้ว`,'success');
  renderCategories();
}

function deleteCat(idx){
  const type=app.catEditType;

  app.categories[type].splice(idx,1);

  renderCategories();
}

/* ══════════════════════════════════════════════════
   APPS SCRIPT CODE (เก็บเป็น string — ไม่มี backtick ใน template)
══════════════════════════════════════════════════ */
const GS_CODE = [
  '// FinFlow — Code.gs  วางแทนที่โค้ดเดิมทั้งหมด แล้ว Deploy ใหม่',
  'var SHEET_TXN="FinFlow", SHEET_CATS="Categories", SHEET_SLIPS="Slips";',
  'var TXN_HDR=["ID","วันที่","ประเภท","หมวดหมู่","จำนวน","หมายเหตุ","มีสลิป"];',
  'var CAT_HDR=["ประเภท","Emoji","ชื่อหมวดหมู่"];',
  'var SLIP_HDR=["TxnID","ChunkIndex","Data"];',
  '',
  'function getSheet(name,hdr){',
  '  var ss=SpreadsheetApp.getActiveSpreadsheet();',
  '  var sh=ss.getSheetByName(name);',
  '  if(!sh){sh=ss.insertSheet(name);if(hdr&&hdr.length>0)sh.appendRow(hdr);}',
  '  return sh;',
  '}',
  'function out(d){return ContentService.createTextOutput(JSON.stringify(d)).setMimeType(ContentService.MimeType.JSON);}',
  '',
  'function doGet(e){',
  '  var a=(e&&e.parameter&&e.parameter.action)||"read";',
  '  if(a==="read"){',
  '    var sh=getSheet(SHEET_TXN,TXN_HDR);',
  '    var vals=sh.getDataRange().getValues();',
  '    var rows=[];for(var i=1;i<vals.length;i++){if(vals[i][0]!=="")rows.push(vals[i]);}',
  '    return out(rows);',
  '  }',
  '  if(a==="readCats"){',
  '    var sh=getSheet(SHEET_CATS,CAT_HDR);',
  '    var vals=sh.getDataRange().getValues();',
  '    var rows=[];for(var i=1;i<vals.length;i++){if(vals[i][0]!=="")rows.push(vals[i]);}',
  '    return out(rows);',
  '  }',
  '  if(a==="readSlip"){',
  '    var id=e.parameter.id;',
  '    if(!id)return out({ok:false,error:"missing id"});',
  '    var sh=getSheet(SHEET_SLIPS,SLIP_HDR);',
  '    var vals=sh.getDataRange().getValues();',
  '    var chunks=[];',
  '    for(var i=1;i<vals.length;i++){if(String(vals[i][0])===String(id))chunks.push(vals[i]);}',
  '    if(!chunks.length)return out({ok:true,data:null});',
  '    chunks.sort(function(a,b){return Number(a[1])-Number(b[1]);});',
  '    var base64=chunks.map(function(r){return String(r[2]);}).join("");',
  '    return out({ok:true,data:base64});',
  '  }',
  '  return out({ok:false,error:"unknown action"});',
  '}',
  '',
  'function doPost(e){',
  '  var p=JSON.parse(e.postData.contents);',
  '  var a=p.action||"write";',
  '  if(a==="write"){',
  '    var sh=getSheet(SHEET_TXN,TXN_HDR);sh.clearContents();sh.appendRow(TXN_HDR);',
  '    if(p.rows&&p.rows.length>0)sh.getRange(2,1,p.rows.length,p.rows[0].length).setValues(p.rows);',
  '    return out({ok:true});',
  '  }',
  '  if(a==="writeCats"){',
  '    var sh=getSheet(SHEET_CATS,CAT_HDR);sh.clearContents();sh.appendRow(CAT_HDR);',
  '    if(p.rows&&p.rows.length>0)sh.getRange(2,1,p.rows.length,p.rows[0].length).setValues(p.rows);',
  '    return out({ok:true});',
  '  }',
  '  if(a==="writeSlip"){',
  '    if(!p.id)return out({ok:false,error:"missing id"});',
  '    var sh=getSheet(SHEET_SLIPS,SLIP_HDR);',
  '    var vals=sh.getDataRange().getValues();',
  '    for(var i=vals.length-1;i>=1;i--){if(String(vals[i][0])===String(p.id))sh.deleteRow(i+1);}',
  '    var chunks=p.chunks||[];',
  '    if(chunks.length>0){',
  '      var newRows=[];',
  '      for(var i=0;i<chunks.length;i++)newRows.push([String(p.id),i,chunks[i]]);',
  '      sh.getRange(sh.getLastRow()+1,1,newRows.length,3).setValues(newRows);',
  '    }',
  '    return out({ok:true,chunks:chunks.length});',
  '  }',
  '  if(a==="deleteSlip"){',
  '    if(!p.id)return out({ok:false,error:"missing id"});',
  '    var sh=getSheet(SHEET_SLIPS,SLIP_HDR);',
  '    var vals=sh.getDataRange().getValues();',
  '    for(var i=vals.length-1;i>=1;i--){if(String(vals[i][0])===String(p.id))sh.deleteRow(i+1);}',
  '    return out({ok:true});',
  '  }',
  '  return out({ok:false,error:"unknown action: "+a});',
  '}'
].join('\n');

function fillGsCodeBox(){
  const el=document.getElementById('gsCodeBox');
  if(el)el.textContent=GS_CODE;
}
function copyGsCode(){
  navigator.clipboard.writeText(GS_CODE).then(()=>toast('📋 คัดลอกโค้ดแล้ว!','success')).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=GS_CODE;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    toast('📋 คัดลอกโค้ดแล้ว!','success');
  });
}
function saveGS(){
  app.gs.webAppUrl=document.getElementById('gsWebAppUrl')?.value.trim()||'';
  app.gs.enabled=document.getElementById('gsEnabled')?.checked||false;
  save();
  if(app.gs.enabled&&app.gs.webAppUrl){
    const params=new URLSearchParams({gs:app.gs.webAppUrl});
    history.replaceState(null,'','#'+params.toString());
    document.getElementById('gsShareUrl')?.classList.remove('hidden');
    const shareInput=document.getElementById('gsShareUrlInput');
    if(shareInput)shareInput.value=window.location.href;
  } else {
    history.replaceState(null,'',window.location.pathname+window.location.search);

}
function copyShareUrl(){
  const input=document.getElementById('gsShareUrlInput');if(!input)return;

  toast('📋 คัดลอก URL แล้ว','success');
}
async function testGS(){
  const el=document.getElementById('gsSyncStatus');
  const url=document.getElementById('gsWebAppUrl')?.value.trim()||app.gs.webAppUrl;
  if(!url){if(el)el.innerHTML=`<span class="sync-badge sync-err">❌ กรุณากรอก URL</span>`;return}
  if(el)el.innerHTML=`<span class="sync-badge" style="color:var(--text-3)">⏳ กำลังทดสอบ…</span>`;
  try{
    const res=await fetch(url+'?action=read');const data=await res.json();
    if(Array.isArray(data)){if(el)el.innerHTML=`<span class="sync-badge sync-ok">✅ เชื่อมต่อสำเร็จ (${data.length} รายการ)</span>`}
    else{if(el)el.innerHTML=`<span class="sync-badge sync-err">❌ Response ไม่ถูกต้อง</span>`}
  }catch(e){if(el)el.innerHTML=`<span class="sync-badge sync-err">❌ ${e.message}</span>`}
}
async function manualPull(){
  const el=document.getElementById('gsSyncStatus');
  if(!app.gs.webAppUrl){toast('กรุณากรอก Web App URL ก่อน','error');return}
  if(el)el.innerHTML=`<span class="sync-badge" style="color:var(--text-3)">⏳ กำลังดึงข้อมูล…</span>`;
  const ok=await pullFromGS();
  await pullCatsFromGS();
  if(ok){
    const slipCount=app.transactions.filter(t=>t.slipImg).length;
    if(el)el.innerHTML=`<span class="sync-badge sync-ok">✅ ดึงข้อมูลสำเร็จ (${app.transactions.length} รายการ, สลิป ${slipCount} รูป)</span>`;
    toast('✅ ดึงข้อมูลสำเร็จ','success');renderPage('overview');
  } else {
    if(el)el.innerHTML=`<span class="sync-badge sync-err">❌ ดึงข้อมูลไม่สำเร็จ</span>`;
    toast('ดึงข้อมูลไม่สำเร็จ','error');
  }
}
async function manualPush(){
  const el=document.getElementById('gsSyncStatus');
  if(!app.gs.webAppUrl){toast('กรุณากรอก Web App URL ก่อน','error');return}
  if(el)el.innerHTML=`<span class="sync-badge" style="color:var(--text-3)">⏳ กำลังอัปโหลดรายการ…</span>`;
  await pushAllToGS();

    if(el)el.innerHTML=`<span class="sync-badge" style="color:var(--text-3)">⏳ กำลังอัปโหลดสลิป (${withSlip.length} รูป)…</span>`;

  }

  if(el)el.innerHTML=`<span class="sync-badge sync-ok">✅ อัปโหลดสำเร็จ (${app.transactions.length} รายการ, สลิป ${slipCount} รูป)</span>`;
  toast('✅ อัปโหลดข้อมูลไปยัง Google Sheet สำเร็จ','success');
}

async function gsRequest(params){
  if(!app.gs.webAppUrl)return null;
  try{
    if(params.action==='read'||params.action==='readCats'){
      const res=await fetch(app.gs.webAppUrl+'?action='+params.action);
      return await res.json();
    }
    if(params.action==='readSlip'){
      const res=await fetch(app.gs.webAppUrl+'?action=readSlip&id='+encodeURIComponent(params.id));
      return await res.json();
    }
    const res=await fetch(app.gs.webAppUrl,{
      method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(params)
    });
    return await res.json();
  }catch(e){console.warn('GS:',e);return null}
}

// ── Transaction rows (ไม่มี base64 — สลิปอยู่ใน Slips sheet แยก) ──
function txnToRow(t){
  return[t.id,t.date,t.type==='income'?'รายรับ':'รายจ่าย',t.category,t.amount.toFixed(2),t.note||'',t.slipImg?'1':''];
}
function rowToTxn(r){
  if(!r[0])return null;
  const hasSlip=r[6]==='1'||r[6]===1||r[6]===true||r[6]==='TRUE'||r[6]==='true';
  return{id:Number(r[0]),date:r[1],type:r[2]==='รายรับ'?'income':'expense',category:r[3],amount:parseFloat(r[4])||0,note:r[5]||'',slipImg:null,_hasSlip:hasSlip,_slipPending:hasSlip};
}

// ── Push transactions (no slip data) ──
async function pushAllToGS(){
  if(!app.gs.enabled||!app.gs.webAppUrl)return;
  await gsRequest({action:'write',rows:app.transactions.map(txnToRow)});
}

// ── Push slips for transactions that have one ──
// ส่งทีละรูปเพื่อไม่ให้ payload ใหญ่เกิน
async function pushSlipsToGS(txnsWithSlip){
  if(!app.gs.enabled||!app.gs.webAppUrl)return;
  if(!txnsWithSlip||!txnsWithSlip.length)return;
  for(const t of txnsWithSlip){
    if(!t.slipImg)continue;
    // แบ่ง base64 เป็น chunks ๆ ละ 40,000 chars (< 50k cell limit)
    const CHUNK=40000;
    const chunks=[];
    for(let i=0;i<t.slipImg.length;i+=CHUNK)chunks.push(t.slipImg.slice(i,i+CHUNK));
    await gsRequest({action:'writeSlip',id:t.id,chunks});
  }
}

// ── Pull transactions then fetch slips for each ──
async function pullFromGS(){
  if(!app.gs.enabled||!app.gs.webAppUrl)return false;
  const data=await gsRequest({action:'read'});
  if(!Array.isArray(data))return false;
  const txns=data.map(rowToTxn).filter(Boolean);

  // ดึงสลิปทีละรายการ พร้อม progress
  const withSlip=txns.filter(t=>t._hasSlip);
  for(let i=0;i<withSlip.length;i++){
    const t=withSlip[i];
    const ovl=document.getElementById('gsLoadingOverlay');
    if(ovl){const p=ovl.querySelector('p');if(p)p.textContent=`กำลังโหลดสลิป ${i+1}/${withSlip.length}…`;}
    const res=await gsRequest({action:'readSlip',id:t.id});
    if(res&&res.data){
      t.slipImg=res.data;
      t._slipPending=false;
    }
    // ถ้าโหลดไม่สำเร็จ _slipPending ยังเป็น true → แสดงปุ่ม "โหลด" ในตาราง
  }
  txns.forEach(t=>delete t._hasSlip);
  app.transactions=txns;
  save();return true;
}

async function syncGS(){await pushAllToGS()}

// Categories GS sync
function catToRow(type,c){return[type,c.emoji,c.name]}
async function pushCatsToGS(){
  if(!app.gs.enabled||!app.gs.webAppUrl)return;
  const rows=[
    ...app.categories.income.map(c=>catToRow('income',c)),
    ...app.categories.expense.map(c=>catToRow('expense',c)),
  ];
  await gsRequest({action:'writeCats',rows});
}
async function pullCatsFromGS(){
  if(!app.gs.enabled||!app.gs.webAppUrl)return false;
  const data=await gsRequest({action:'readCats'});
  if(!Array.isArray(data)||data.length===0)return false;
  const newCats={income:[],expense:[]};
  data.forEach(r=>{
    const type=r[0],emoji=r[1],name=r[2];
    if((type==='income'||type==='expense')&&name)newCats[type].push({emoji:emoji||'🌸',name});
  });
  if(newCats.income.length||newCats.expense.length){app.categories=newCats;save()}
  return true;
}

function importCSV(){document.getElementById('csvFile')?.click()}
function processCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').filter(l=>l.trim());let count=0;
    lines.slice(1).forEach(line=>{
      const parts=line.split(',').map(p=>p.replace(/^"|"$/g,'').trim());
      if(parts.length>=4){
        const[date,typeStr,cat,amt,note='']= parts;
        const type=typeStr.includes('รับ')?'income':'expense';
        const amount=parseFloat(amt);
        if(date&&amount>0){app.transactions.push({id:Date.now()+count,type,amount,category:cat||'อื่นๆ',date,note,slipImg:null});count++}
      }
    });
    save();toast(`✅ นำเข้า ${count} รายการ`,'success');renderPage(app.page);
  };
  reader.readAsText(file,'UTF-8');
}
function clearData(){
  if(!confirm('🗑️ ล้างข้อมูลทั้งหมด?'))return;
  app.transactions=[];save();pushAllToGS();toast('🗑️ ล้างข้อมูลเรียบร้อย','success');renderPage('overview');
}
function seedData(){
  const n=now();const txns=[];
  for(let m=0;m<6;m++){
    const mo=new Date(n.getFullYear(),n.getMonth()-m,1);
    txns.push({id:Date.now()+m*10000,type:'income',amount:28000+Math.random()*8000,category:'เงินเดือน',date:fmtDateInput(new Date(mo.getFullYear(),mo.getMonth(),25)),note:'เงินเดือนประจำเดือน',slipImg:null});
    if(m%2===0)txns.push({id:Date.now()+m*10000+1,type:'income',amount:2000+Math.random()*6000,category:'ฟรีแลนซ์',date:fmtDateInput(new Date(mo.getFullYear(),mo.getMonth(),10)),note:'งานเสริม',slipImg:null});
    app.categories.expense.slice(0,7).forEach((cat,i)=>{
      const d=new Date(mo.getFullYear(),mo.getMonth(),3+i*4);
      txns.push({id:Date.now()+m*10000+i+10,type:'expense',amount:300+Math.random()*3500,category:cat.name,date:fmtDateInput(d),note:'',slipImg:null});
    });
  }
  app.transactions=txns;save();toast('🌱 เพิ่มข้อมูลทดสอบแล้ว','success');renderPage('overview');
}
