<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FinFlow 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Mitr','Sarabun',sans-serif;
  --sw:230px; --th:60px;
  --brand:#ff6b9d; --brand2:#a78bfa; --brand3:#38bdf8;
  --brand-lt:#fff0f6; --brand-dk:#e8457a;
  --inc:#10b981; --inc-bg:#d1fae5;
  --exp:#f43f5e; --exp-bg:#ffe4e6;
  --warn:#f59e0b; --warn-bg:#fef3c7;
  --bg:#fdf2f8; --surf:#fff; --surf2:#fdf9ff;
  --sb:linear-gradient(180deg,#1e1245 0%,#12082e 100%);
  --txt:#2d1b69; --txt2:#6b46a0; --txt3:#a78bcc; --txtw:#fff;
  --bdr:rgba(167,139,250,.15); --bdr2:rgba(167,139,250,.25);
  --r1:8px; --r2:14px; --r3:20px;
  --sh:0 2px 8px rgba(167,139,250,.1);
  --sh2:0 8px 24px rgba(167,139,250,.18);
}
[data-theme=dark]{
  --bg:#160d2e; --surf:#1e1245; --surf2:#251858;
  --txt:#f0e8ff; --txt2:#c4b0e8; --txt3:#7c6aad;
  --bdr:rgba(167,139,250,.12); --bdr2:rgba(167,139,250,.2);
  --brand-lt:#2d1b69; --inc-bg:#064e3b; --exp-bg:#4c0519;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:9px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

/* ── Login ── */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--sb);position:relative;overflow:hidden}
#loginPage::before{content:'🌸 💖 ✨ 🌺 💕 🌸';position:absolute;top:0;left:0;right:0;
  font-size:20px;letter-spacing:20px;padding:1rem;opacity:.1;white-space:nowrap;overflow:hidden;animation:float 3s ease-in-out infinite}
.lcard{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--r3);padding:2.5rem 2rem;width:370px;backdrop-filter:blur(20px);
  box-shadow:0 24px 64px rgba(0,0,0,.3);animation:pop .4s ease;position:relative;z-index:1}
.lbrand{text-align:center;margin-bottom:1.75rem}
.llogo{width:64px;height:64px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:.75rem;box-shadow:0 10px 28px rgba(255,107,157,.4);animation:float 3s ease-in-out infinite}
.lbrand h1{color:#fff;font-size:22px;font-weight:600}
.lbrand p{color:rgba(255,255,255,.4);font-size:12px;margin-top:3px}
.lfield{margin-bottom:.875rem}
.lfield label{display:block;color:rgba(255,255,255,.45);font-size:10px;font-weight:600;
  letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.lfield input{width:100%;padding:.6rem .875rem;background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);border-radius:var(--r1);color:#fff;
  font-size:13px;font-family:var(--font);outline:none;transition:.2s}
.lfield input:focus{border-color:var(--brand);background:rgba(255,107,157,.12)}
.lfield input::placeholder{color:rgba(255,255,255,.2)}
.lbtn{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;border:none;border-radius:var(--r1);font-size:14px;font-weight:600;
  font-family:var(--font);cursor:pointer;margin-top:1.25rem;
  box-shadow:0 6px 18px rgba(255,107,157,.4);transition:.18s}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,107,157,.5)}
.lhint{color:rgba(255,255,255,.2);font-size:10px;text-align:center;margin-top:.75rem}
.lerr{background:rgba(244,63,94,.15);border:1px solid rgba(244,63,94,.3);color:#fda4b5;
  border-radius:var(--r1);padding:.45rem .7rem;font-size:11px;margin-top:.625rem;display:none}

/* ── App Layout ── */
#appPage{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:var(--sw);background:var(--sb);display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:visible;
  box-shadow:4px 0 20px rgba(0,0,0,.15)}
#sbColBtn{position:absolute;top:50%;right:-13px;transform:translateY(-50%);
  width:26px;height:26px;background:var(--surf);border:1px solid var(--bdr2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:10px;color:var(--txt2);box-shadow:var(--sh);z-index:101;transition:.2s}
#sbColBtn:hover{background:var(--brand-lt);color:var(--brand)}
.sb-logo{padding:1.25rem 1.25rem .875rem;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid rgba(255,255,255,.07)}
.sb-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;box-shadow:0 4px 10px rgba(255,107,157,.35)}
.sb-logo span{color:#fff;font-size:16px;font-weight:600}
.sb-logo small{color:rgba(255,255,255,.3);font-size:9px;display:block}
.nav-sec{padding:.3rem 0}
.nav-lbl{color:rgba(255,255,255,.2);font-size:8.5px;font-weight:600;letter-spacing:1.2px;
  text-transform:uppercase;padding:.5rem 1.25rem .25rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:.55rem 1.25rem;
  color:rgba(255,255,255,.45);cursor:pointer;font-size:12.5px;transition:.18s;
  border-left:3px solid transparent;user-select:none}
.nav-item em{font-size:15px;width:17px;text-align:center;font-style:normal}
.nav-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.07)}
.nav-item.active{color:#fff;background:rgba(255,107,157,.22);border-left-color:var(--brand)}
.sb-footer{margin-top:auto;padding:.875rem 1.25rem;border-top:1px solid rgba(255,255,255,.07)}
.u-row{display:flex;align-items:center;gap:7px}
.u-av{width:32px;height:32px;background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
.u-name{color:rgba(255,255,255,.8);font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.u-role{color:rgba(255,255,255,.3);font-size:9px}
.u-out{color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;padding:3px;border-radius:5px;transition:.2s;font-size:15px}
.u-out:hover{color:rgba(255,255,255,.7)}

/* ── Sidebar collapsed ── */
.sb-col .sidebar{width:60px}
.sb-col .sb-logo span,.sb-col .sb-logo small,.sb-col .nav-lbl,.sb-col .nav-item .nav-text,.sb-col .u-name,.sb-col .u-role,.sb-col .u-out{display:none!important}
.sb-col .nav-item{justify-content:center;padding:.6rem 0;position:relative}
.sb-col .sb-logo{justify-content:center;padding:1.25rem 0 .875rem}
.sb-col .u-row{justify-content:center}
.sb-col .main{margin-left:60px}
.sb-col #sbColBtn{right:-13px}
.sb-col .nav-item:hover::after{content:attr(data-tip);position:absolute;left:68px;top:50%;
  transform:translateY(-50%);background:var(--txt);color:var(--surf);
  padding:4px 10px;border-radius:7px;font-size:11px;white-space:nowrap;z-index:300;
  box-shadow:0 3px 10px rgba(0,0,0,.15)}

/* ── Overlay ── */
#sbOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;backdrop-filter:blur(2px)}
#sbOverlay.on{display:block}

/* ── Main ── */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .28s}
.topbar{height:var(--th);background:rgba(255,255,255,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--bdr);display:flex;align-items:center;
  justify-content:space-between;padding:0 1.375rem;position:sticky;top:0;z-index:50;
  box-shadow:0 2px 10px rgba(167,139,250,.07)}
[data-theme=dark] .topbar{background:rgba(30,18,69,.88)}
.topbar-l{display:flex;align-items:center;gap:9px}
.topbar-l h1{font-size:15px;font-weight:600;color:var(--txt)}
.topbar-r{display:flex;align-items:center;gap:7px}
.content{padding:1.375rem;flex:1;animation:fadeUp .3s ease}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:.4rem .85rem;
  border-radius:var(--r1);border:1px solid var(--bdr2);background:var(--surf);color:var(--txt2);
  font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;transition:.18s;white-space:nowrap}
.btn:hover{background:var(--brand-lt);border-color:var(--brand);color:var(--brand)}
.btn-p{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;
  box-shadow:0 4px 12px rgba(255,107,157,.28)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,107,157,.38);color:#fff;
  background:linear-gradient(135deg,var(--brand),var(--brand2))}
.btn-sm{padding:.27rem .6rem;font-size:11px}
.btn-ic{padding:.38rem;border-radius:var(--r1)}
.btn-ok{background:var(--inc);color:#fff;border-color:var(--inc)}
.btn-ok:hover{background:#047857;color:#fff}
.btn-del{background:var(--exp);color:#fff;border-color:var(--exp)}
.btn-del:hover{background:#be123c;color:#fff}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r3);box-shadow:var(--sh);overflow:hidden}
.ch{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;border-bottom:1px solid var(--bdr)}
.ch h3{font-size:12.5px;font-weight:600;color:var(--txt)}
.cb{padding:1.125rem}

/* ── Account header ── */
.acct-hdr{background:linear-gradient(135deg,var(--brand) 0%,var(--brand2) 100%);
  border-radius:var(--r3);padding:1.375rem 1.625rem 1.625rem;color:#fff;margin-bottom:1.25rem;
  position:relative;overflow:hidden}
.acct-hdr::before{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;
  border-radius:50%;background:rgba(255,255,255,.07)}
.acct-hdr::after{content:'';position:absolute;right:40px;bottom:-50px;width:100px;height:100px;
  border-radius:50%;background:rgba(255,255,255,.05)}
.acct-lbl{font-size:12px;opacity:.7;margin-bottom:3px}
.acct-bal{font-size:30px;font-weight:700;letter-spacing:-.5px;margin-bottom:1.125rem;position:relative;z-index:1}
.acct-row{display:flex;gap:1rem;position:relative;z-index:1}
.acct-st{flex:1;background:rgba(255,255,255,.12);border-radius:var(--r2);padding:.625rem .875rem}
.acct-st-lbl{font-size:9px;opacity:.65;margin-bottom:2px;display:flex;align-items:center;gap:4px;font-weight:500}
.acct-st-val{font-size:15px;font-weight:700}

/* ── Period selector ── */
.period-bar{display:flex;gap:5px;margin-bottom:1.125rem;flex-wrap:wrap}
.pb{padding:.32rem .8rem;border-radius:99px;border:1.5px solid var(--bdr2);background:transparent;
  color:var(--txt2);font-family:var(--font);font-size:11.5px;font-weight:500;cursor:pointer;transition:.18s}
.pb:hover{background:var(--brand-lt);border-color:var(--brand);color:var(--brand)}
.pb.on{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent;color:#fff;
  box-shadow:0 3px 10px rgba(255,107,157,.3)}

/* ── Summary strip ── */
.sum-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:.875rem;margin-bottom:1.25rem}
.sum-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r2);
  padding:.875rem 1rem;transition:.2s}
.sum-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sum-card.inc{border-top:3px solid var(--inc)}
.sum-card.exp{border-top:3px solid var(--exp)}
.sum-card.bal{border-top:3px solid var(--brand)}
.sum-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:15px;margin-bottom:.5rem}
.sum-ic.inc{background:var(--inc-bg);color:var(--inc)}
.sum-ic.exp{background:var(--exp-bg);color:var(--exp)}
.sum-ic.bal{background:var(--brand-lt);color:var(--brand)}
.sum-lbl{font-size:10px;color:var(--txt3);font-weight:500;margin-bottom:2px}
.sum-val{font-size:18px;font-weight:700;line-height:1.2}
.sum-val.inc{color:var(--inc)} .sum-val.exp{color:var(--exp)} .sum-val.bal{color:var(--brand)}
.sum-sub{font-size:9.5px;color:var(--txt3);margin-top:2px}

/* ── 2-col overview ── */
.ov-grid{display:grid;grid-template-columns:1fr 1.65fr;gap:1.125rem;align-items:start}
.ov-left{display:flex;flex-direction:column;gap:1.125rem}

/* ── Txn card list ── */
.txn-list{display:flex;flex-direction:column}
.dg{padding:.45rem 1.2rem .2rem;font-size:10px;font-weight:600;color:var(--txt3);
  background:var(--surf2);border-bottom:1px solid var(--bdr);letter-spacing:.4px;
  display:flex;justify-content:space-between;align-items:center}
.dg-sum{display:flex;gap:10px;font-size:10px}
.tc{display:flex;align-items:center;gap:11px;padding:.825rem 1.2rem;
  border-bottom:1px solid var(--bdr);transition:.15s;cursor:pointer;position:relative}
.tc:last-child{border-bottom:none}
.tc:hover{background:var(--surf2)}
.tc-av{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;
  justify-content:center;font-size:21px;flex-shrink:0}
.tc-av.income{background:var(--inc-bg)} .tc-av.expense{background:var(--exp-bg)}
.tc-info{flex:1;min-width:0}
.tc-cat{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-meta{font-size:11px;color:var(--txt3);margin-top:1px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tc-right{text-align:right;flex-shrink:0}
.tc-amt{font-size:13.5px;font-weight:700}
.tc-amt.income{color:var(--inc)} .tc-amt.expense{color:var(--exp)}
.tc-ds{font-size:9.5px;color:var(--txt3);margin-top:1px}
.tc-acts{display:flex;gap:3px;opacity:0;transition:.15s}
.tc:hover .tc-acts{opacity:1}
.act-btn{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:7px;color:var(--txt3);transition:.15s;font-size:13px}
.act-btn:hover{background:var(--brand-lt);color:var(--brand)}
.act-btn.del:hover{background:var(--exp-bg);color:var(--exp)}
.slip-dot{width:6px;height:6px;border-radius:50%;background:var(--brand);display:inline-block}
.slip-link{color:var(--brand);font-size:10px;cursor:pointer;text-decoration:none}
.slip-link:hover{text-decoration:underline}
.load-btn{background:var(--brand-lt);color:var(--brand);border:1px solid var(--brand);
  border-radius:7px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:var(--font);transition:.15s}
.load-btn:hover{background:var(--brand);color:#fff}
.load-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Filter tags ── */
.ftags{display:flex;gap:5px;padding:.625rem 1.2rem;overflow-x:auto;border-bottom:1px solid var(--bdr);scrollbar-width:none}
.ftags::-webkit-scrollbar{display:none}
.tag{padding:.26rem .8rem;border-radius:99px;border:1.5px solid var(--bdr2);background:transparent;
  color:var(--txt2);font-size:11.5px;font-weight:500;cursor:pointer;white-space:nowrap;
  font-family:var(--font);transition:.15s;flex-shrink:0}
.tag:hover,.tag.on{background:var(--brand);border-color:var(--brand);color:#fff}
.tag.on-inc{background:var(--inc);border-color:var(--inc);color:#fff}
.tag.on-exp{background:var(--exp);border-color:var(--exp);color:#fff}
.tag-div{width:1px;background:var(--bdr);margin:0 3px;flex-shrink:0}

/* ── Search ── */
.sbar{display:flex;align-items:center;gap:7px;padding:.55rem 1.2rem;border-bottom:1px solid var(--bdr)}
.sbar input{flex:1;border:none;background:none;font-size:12.5px;color:var(--txt);font-family:var(--font);outline:none}
.sbar input::placeholder{color:var(--txt3)}
.sbar select{border:none;background:none;font-size:11.5px;color:var(--txt2);font-family:var(--font);cursor:pointer;outline:none}

/* ── Empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3.5rem 1rem;text-align:center;min-height:260px}
.empty .ei{font-size:50px;margin-bottom:.875rem;animation:float 3s ease-in-out infinite}
.empty h3{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:.375rem}
.empty p{font-size:12px;color:var(--txt3);line-height:1.7;max-width:220px}

/* ── Slim summary ── */
.slim-sum{display:flex;gap:1rem;padding:.55rem 1.2rem;font-size:11.5px;color:var(--txt2);
  border-top:1px solid var(--bdr);background:var(--surf2);flex-wrap:wrap}
.slim-sum b{font-weight:600}

/* ── FAB ── */
.fab{position:fixed;right:1.5rem;bottom:1.5rem;width:54px;height:54px;border-radius:50%;
  border:none;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;
  font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(255,107,157,.42);z-index:89;transition:.18s}
.fab:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 10px 30px rgba(255,107,157,.52)}
.fab:active{transform:scale(.94)}

/* ── Form ── */
.type-tog{display:flex;gap:7px;margin-bottom:1.125rem}
.tt{flex:1;padding:.55rem;border-radius:var(--r1);border:1.5px solid var(--bdr2);
  background:transparent;color:var(--txt2);font-family:var(--font);font-size:12.5px;font-weight:500;
  cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.tt.i{background:var(--inc-bg);border-color:var(--inc);color:var(--inc)}
.tt.e{background:var(--exp-bg);border-color:var(--exp);color:var(--exp)}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10.5px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:.48rem .7rem;border-radius:var(--r1);border:1px solid var(--bdr2);
  background:var(--surf2);color:var(--txt);font-size:12.5px;font-family:var(--font);outline:none;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--brand);background:var(--surf)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px}
.fgrid .full{grid-column:1/-1}

/* ── Slip upload ── */
.slip-area{border:2px dashed var(--bdr2);border-radius:var(--r2);padding:1.125rem;
  text-align:center;cursor:pointer;transition:.2s;background:var(--surf2);position:relative}
.slip-area:hover{border-color:var(--brand);background:var(--brand-lt)}
.slip-area.has{border-style:solid;border-color:var(--brand)}
.slip-area .hint{color:var(--txt3);font-size:12px;display:flex;flex-direction:column;align-items:center;gap:5px}
.slip-area .hint .ico{font-size:26px}
.slip-prev{width:100%;max-height:150px;object-fit:contain;border-radius:var(--r1);margin-top:.375rem}
.slip-rm{position:absolute;top:7px;right:7px;background:rgba(244,63,94,.9);color:#fff;
  border:none;border-radius:50%;width:22px;height:22px;font-size:11px;cursor:pointer;
  display:none;align-items:center;justify-content:center}
.slip-area.has .slip-rm{display:flex}

/* ── Chart wrap ── */
.cw{position:relative}

/* ── Report table ── */
.rtbl{width:100%;border-collapse:collapse;font-size:12.5px}
.rtbl th{padding:.5rem .875rem;text-align:left;font-size:9.5px;font-weight:600;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.6px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
.rtbl td{padding:.6rem .875rem;border-bottom:1px solid var(--bdr);color:var(--txt)}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tr:hover td{background:var(--surf2)}
.ai{color:var(--inc);font-weight:500} .ae{color:var(--exp);font-weight:500}

/* ── Category manager ── */
.cat-tab{display:flex;gap:5px;margin-bottom:1.125rem}
.ctb{padding:.35rem .8rem;border-radius:99px;border:1.5px solid var(--bdr2);background:transparent;
  color:var(--txt2);font-family:var(--font);font-size:11.5px;font-weight:500;cursor:pointer;transition:.18s}
.ctb.on{background:linear-gradient(135deg,var(--brand),var(--brand2));border-color:transparent;color:#fff}
.cat-item{display:flex;align-items:center;gap:9px;padding:.7rem .875rem;background:var(--surf2);
  border:1px solid var(--bdr);border-radius:var(--r2);transition:.18s}
.cat-item:hover{border-color:var(--brand)}
.cat-list{display:flex;flex-direction:column;gap:7px}
.cat-add{display:flex;gap:7px;margin-top:.875rem;flex-wrap:wrap;align-items:center}
.cat-add input{padding:.44rem .7rem;border-radius:var(--r1);border:1px solid var(--bdr2);
  background:var(--surf);color:var(--txt);font-size:12.5px;font-family:var(--font);outline:none}
.cat-add input:focus{border-color:var(--brand)}
.cat-add .emoji-in{width:72px}

/* ── Settings ── */
.set-row{display:flex;align-items:center;gap:11px;padding-bottom:.8rem;border-bottom:1px solid var(--bdr)}
.set-row:last-child{border-bottom:none;padding-bottom:0}
.set-lbl{font-size:11.5px;font-weight:600;color:var(--txt2);width:130px;flex-shrink:0}
.set-desc{font-size:10.5px;color:var(--txt3);margin-top:2px}
.set-in{flex:1}
.set-in input{width:100%;padding:.42rem .7rem;border-radius:var(--r1);border:1px solid var(--bdr2);
  background:var(--surf2);color:var(--txt);font-size:12.5px;font-family:var(--font);outline:none}
.set-in input:focus{border-color:var(--brand)}
.toggle{position:relative;display:inline-block;width:36px;height:20px}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--bdr2);border-radius:99px;cursor:pointer;transition:.2s}
.tslider::before{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;left:3px;top:3px;transition:.2s}
.toggle input:checked+.tslider{background:var(--brand)}
.toggle input:checked+.tslider::before{transform:translateX(16px)}
.sync-ok{background:var(--inc-bg);color:var(--inc);padding:3px 10px;border-radius:99px;font-size:10.5px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.sync-err{background:var(--exp-bg);color:var(--exp);padding:3px 10px;border-radius:99px;font-size:10.5px}
.sync-wait{background:var(--warn-bg);color:var(--warn);padding:3px 10px;border-radius:99px;font-size:10.5px}

/* ── Lightbox ── */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9998;display:none;
  align-items:center;justify-content:center;backdrop-filter:blur(8px);padding:1.5rem}
#lb.on{display:flex}
#lb .lbx-close{position:absolute;top:1.25rem;right:1.25rem;background:rgba(255,255,255,.15);
  border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
#lb .lbx-close:hover{background:rgba(255,255,255,.25)}
#lb-inner{display:flex;flex-direction:column;align-items:center;gap:12px;max-width:90vw}
#lb-img{max-width:90vw;max-height:72vh;border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
#lb-info{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);
  border-radius:11px;padding:.65rem 1.125rem;color:#fff;font-size:12.5px;display:flex;gap:1.25rem;flex-wrap:wrap}
#lb-dl{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22);
  border-radius:8px;padding:.38rem .9rem;font-size:11.5px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}

/* ── Toast ── */
#toasts{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surf);color:var(--txt);padding:.6rem 1rem;border-radius:var(--r2);
  font-size:12.5px;display:flex;align-items:center;gap:7px;box-shadow:var(--sh2);
  animation:toastIn .28s ease;max-width:280px;border:1px solid var(--bdr2)}
.toast.ok{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none}
.toast.err{background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;border:none}

/* ── Bottom nav ── */
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.93);
  backdrop-filter:blur(20px);border-top:1px solid var(--bdr);z-index:200;
  padding-bottom:max(6px,env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(167,139,250,.12)}
[data-theme=dark] #bnav{background:rgba(30,18,69,.93)}
.bnav-in{display:flex;justify-content:space-around;align-items:center;padding:4px 0}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 9px;
  border-radius:11px;cursor:pointer;color:var(--txt3);font-size:9px;font-weight:500;
  transition:.18s;min-width:46px;border:none;background:none;font-family:var(--font)}
.bni .bic{font-size:20px;line-height:1.2;transition:.18s}
.bni.on{color:var(--brand)}
.bni.on .bic{transform:scale(1.1)}
.bn-add-wrap{margin-top:-18px}
.bn-add{width:50px;height:50px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(255,107,157,.42);transition:.18s}
.bn-add:active{transform:scale(.93)}

/* ── Responsive ── */
@media(max-width:1000px){.ov-grid{grid-template-columns:1fr}}
@media(max-width:900px){
  :root{--sw:0px}
  .sidebar{transform:translateX(-230px);width:230px}
  .sidebar.on{transform:translateX(0)}
  .sb-col .sidebar{transform:translateX(-230px)!important;width:230px}
  #sbColBtn{display:none!important}
  .main{margin-left:0!important}
  .sum-strip{grid-template-columns:repeat(2,1fr)}
  .fgrid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .sum-strip{grid-template-columns:1fr 1fr}
  .content{padding:.75rem .75rem 80px}
  .topbar{padding:0 .875rem}
  .sidebar{display:none!important}
  #bnav{display:block}
  #exportExcelBtn,#exportPdfBtn{display:none!important}
  .topbar-r .btn:not(.btn-p):not(#themeBtn){display:none}
  #menuToggle{display:none!important}
  .fab{bottom:78px;right:1rem}
}
@media(min-width:1400px){:root{--sw:248px}.content{padding:1.625rem}}
@media print{.sidebar,.topbar,.btn,.ftags,.fab,#bnav{display:none!important}.main{margin-left:0}.content{padding:0}}
</style>
</head>

<script>
/* FinFlow — all functions in global scope so onclick= attributes work */

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
const USERS=[{u:'demo',p:'1234',name:'สมชาย ใจดี'},{u:'admin',p:'admin',name:'ผู้ดูแลระบบ'}];
const PALETTE=['#ff6b9d','#a78bfa','#38bdf8','#10b981','#f59e0b','#f43f5e','#8b5cf6','#0ea5e9','#06b6d4','#6366f1'];
const DEF_CATS={
  income:[{e:'💰',n:'เงินเดือน'},{e:'🏢',n:'ธุรกิจ'},{e:'📈',n:'การลงทุน'},{e:'🎁',n:'โบนัส'},{e:'💻',n:'ฟรีแลนซ์'},{e:'✨',n:'รายได้อื่นๆ'}],
  expense:[{e:'🍜',n:'อาหาร'},{e:'🏠',n:'ที่พัก'},{e:'🚗',n:'เดินทาง'},{e:'💊',n:'สุขภาพ'},{e:'🛍️',n:'ช้อปปิ้ง'},{e:'🎉',n:'บันเทิง'},{e:'💡',n:'สาธารณูปโภค'},{e:'📚',n:'การศึกษา'},{e:'🛡️',n:'ประกันภัย'},{e:'🌸',n:'อื่นๆ'}]
};
let S={
  user:null,page:'overview',
  txns:[],
  formType:'expense',editId:null,
  period:'monthly',      // daily weekly monthly yearly
  reportPeriod:'monthly',
  filter:{type:'all',year:'all',month:'all',q:''},
  gs:{url:'',on:false},
  cats:{income:[...DEF_CATS.income],expense:[...DEF_CATS.expense]},
  catType:'expense',
  charts:{},
  slipData:null,
};
let sbCollapsed=false;
try{sbCollapsed=localStorage.getItem('ff_sbc')==='1'}catch(e){}

/* ════════════════════════════════════════════
   PERSIST
════════════════════════════════════════════ */
function save(){
  try{localStorage.setItem('ff_txns',JSON.stringify(S.txns))}catch(e){}
  try{localStorage.setItem('ff_gs',JSON.stringify(S.gs))}catch(e){}
  try{localStorage.setItem('ff_cats',JSON.stringify(S.cats))}catch(e){}
}
async function loadData(){
  const hp=new URLSearchParams(window.location.hash.slice(1));
  const gu=hp.get('gs');
  if(gu){S.gs.url=gu;S.gs.on=true;try{localStorage.setItem('ff_gs',JSON.stringify(S.gs))}catch(e){}}
  else{try{const d=localStorage.getItem('ff_gs');if(d)Object.assign(S.gs,JSON.parse(d))}catch(e){}}
  try{const d=localStorage.getItem('ff_cats');if(d){const c=JSON.parse(d);if(c.income&&c.expense)S.cats=c}}catch(e){}
  if(S.gs.on&&S.gs.url){
    showOvl(true);
    const ok=await pullGS();await pullCatsGS();
    showOvl(false);
    if(!ok){tryLocalTxns();toast('ใช้ข้อมูลในเครื่อง (GS ไม่ตอบสนอง)','err')}
  } else {
    const init=localStorage.getItem('ff_init');
    if(!init){localStorage.removeItem('ff_txns');localStorage.setItem('ff_init','1');S.txns=[]}
    else tryLocalTxns();
  }
}
function tryLocalTxns(){try{const d=localStorage.getItem('ff_txns');if(d)S.txns=JSON.parse(d)}catch(e){}}

function showOvl(on){
  let el=document.getElementById('gsOvl');
  if(on){
    if(!el){el=document.createElement('div');el.id='gsOvl';
      el.style.cssText='position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
      el.innerHTML='<div style="font-size:38px;animation:float 1s ease-in-out infinite">🌸</div><div style="width:32px;height:32px;border:3px solid rgba(255,107,157,.3);border-top-color:#ff6b9d;border-radius:50%;animation:spin .7s linear infinite"></div><p style="color:var(--txt2);font-size:12.5px" id="gsOvlTxt">กำลังโหลดข้อมูล…</p>';
      document.body.appendChild(el);}
    el.style.display='flex';
  } else {if(el)el.remove();}
}

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
const now=()=>new Date();
const fdi=d=>d.toISOString().slice(0,10);
const fDate=(d,opt)=>new Date(d).toLocaleDateString('th-TH',opt||{day:'2-digit',month:'short',year:'2-digit'});
const fMoney=n=>new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fShort=n=>Math.abs(n)>=1e6?(n/1e6).toFixed(1)+'M':Math.abs(n)>=1e3?(n/1e3).toFixed(1)+'k':Math.round(n).toString();
const sumT=(txns,t)=>txns.filter(x=>x.type===t).reduce((s,x)=>s+x.amount,0);
const getEM=(type,name)=>{const c=S.cats[type]?.find(x=>x.n===name);return c?c.e:'🌸'};
function getCatNames(type){return(S.cats[type]||[]).map(c=>c.n)}
function destroyCharts(){Object.values(S.charts).forEach(c=>{try{c.destroy()}catch(e){}});S.charts={}}

/* Period helpers */
function getPeriodTxns(period,ref){
  const d=ref||now();
  if(period==='daily'){const ds=fdi(d);return S.txns.filter(t=>t.date===ds)}
  if(period==='weekly'){
    const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));mon.setHours(0,0,0,0);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
    return S.txns.filter(t=>{const td=new Date(t.date);return td>=mon&&td<=sun});
  }
  if(period==='monthly'){return S.txns.filter(t=>{const td=new Date(t.date);return td.getFullYear()===d.getFullYear()&&td.getMonth()===d.getMonth()})}
  if(period==='yearly'){return S.txns.filter(t=>new Date(t.date).getFullYear()===d.getFullYear())}
  return S.txns;
}

function periodLabel(period){
  const d=now();
  if(period==='daily')return fDate(d,{weekday:'short',day:'numeric',month:'short'});
  if(period==='weekly'){const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));return fDate(mon,{day:'numeric',month:'short'})+' – '+fDate(new Date(mon.getTime()+6*86400000),{day:'numeric',month:'short'})}
  if(period==='monthly')return d.toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  if(period==='yearly')return String(d.getFullYear());
  return 'ทั้งหมด';
}

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
function toast(msg,type=''){
  const el=document.createElement('div');el.className='toast '+(type||'');
  el.textContent=(type==='ok'?'✅ ':type==='err'?'❌ ':'💬 ')+msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3400);
}

/* ════════════════════════════════════════════
   LIGHTBOX
════════════════════════════════════════════ */
function lbOpen(src,txn){
  document.getElementById('lb-img').src=src;
  document.getElementById('lb-dl').href=src;
  document.getElementById('lb-dl').download=(txn?'slip_'+txn.date+'_'+txn.category:'slip')+'.jpg';
  const info=document.getElementById('lb-info');
  if(txn){info.style.display='flex';info.innerHTML=`<span>${getEM(txn.type,txn.category)} <b>${txn.category}</b></span><span>📅 ${fDate(txn.date)}</span><span style="color:${txn.type==='income'?'#6ee7b7':'#fda4af'};font-weight:700">฿${fMoney(txn.amount)}</span>${txn.note?'<span>'+txn.note+'</span>':''}`}
  else info.style.display='none';
  document.getElementById('lb').classList.add('on');
}
function lbOpenById(id){const t=S.txns.find(x=>x.id===+id);if(t&&t.slipImg)lbOpen(t.slipImg,t)}
function lbClose(){document.getElementById('lb').classList.remove('on')}


/* ════════════════════════════════════════════
   AUTH
════════════════════════════════════════════ */
function doLogin(){
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  const f=USERS.find(x=>x.u===u&&x.p===p);
  if(f){
    S.user=f;
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appPage').style.display='block';
    document.getElementById('sbName').textContent=f.name;
    document.getElementById('sbAv').textContent=f.name.charAt(0);
    loadData().then(()=>navTo('overview'));
  } else {document.getElementById('lerr').style.display='block'}
}
function doLogout(){
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('appPage').style.display='none';
}


/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
const TITLES={overview:'🏠 ภาพรวม',add:'✨ เพิ่มรายการ',transactions:'📋 รายการ',reports:'📊 รายงาน',categories:'🏷️ หมวดหมู่',settings:'⚙️ ตั้งค่า'};
function navTo(page){
  destroyCharts();S.page=page;S.editId=null;
  document.getElementById('pageTitle').textContent=TITLES[page]||page;

/* ════════════════════════════════════════════
   CARD LIST builder
════════════════════════════════════════════ */
function buildCardList(txns,ctx){
  if(!txns.length)return`<div class="empty"><span class="ei">🌸</span><h3>ยังไม่มีรายการ</h3><p>กด + เพื่อเริ่มบันทึกรายการแรก</p></div>`;
  const grp={};txns.forEach(t=>{if(!grp[t.date])grp[t.date]=[];grp[t.date].push(t)});
  return'<div class="txn-list">'+Object.entries(grp).map(([date,items])=>{
    const di=sumT(items,'income'),de=sumT(items,'expense');
    const dlbl=new Date(date).toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
    return`<div class="dg"><span>${dlbl}</span><span class="dg-sum">${di>0?'<span style="color:var(--inc)">+฿'+fShort(di)+'</span>':''}${de>0?'<span style="color:var(--exp)">-฿'+fShort(de)+'</span>':''}</span></div>`+
    items.map(t=>`<div class="tc" onclick="editTxn(${t.id})">
      <div class="tc-av ${t.type}">${getEM(t.type,t.category)}</div>
      <div class="tc-info">
        <div class="tc-cat">${t.category}</div>
        <div class="tc-meta">${t.note?'<span>'+t.note+'</span>':''}${t.slipImg?`<span class="slip-dot"></span><span class="slip-link" onclick="event.stopPropagation();lbOpenById(${t.id})">📎 สลิป</span>`:''}${t._sp?`<button class="load-btn" data-id="${t.id}" onclick="event.stopPropagation();loadSlip(this)">📎 โหลดสลิป</button>`:''}</div>
      </div>
      <div class="tc-right">
        <div class="tc-amt ${t.type}">${t.type==='income'?'+':'-'}฿${fMoney(t.amount)}</div>
        <div class="tc-acts">
          <button class="act-btn" onclick="event.stopPropagation();editTxn(${t.id})">✏️</button>
          <button class="act-btn del" onclick="event.stopPropagation();delTxn(${t.id})">🗑️</button>
        </div>
      </div>
    </div>`).join('');
  }).join('')+'</div>';
}

          <div class="fg full"><label>สลิป / หลักฐาน</label>

  const area=document.getElementById('slipArea');

function setFT(t){S.formType=t;S.editId=null;renderAdd()}
function handleSlip(e){const f=e.target.files[0];if(f)processSlip(f)}
function processSlip(file){
  const r=new FileReader();r.onload=ev=>{
    pendingSlip=ev.target.result;
    const a=document.getElementById('slipArea');if(!a)return;
    a.classList.add('has');
    a.innerHTML=`<img class="slip-prev" src="${pendingSlip}" alt="สลิป"><button class="slip-rm" id="slipRm" onclick="rmSlip(event)">✕</button>`;
  };r.readAsDataURL(file);
}
function rmSlip(e){e.stopPropagation();pendingSlip=null;const a=document.getElementById('slipArea');if(!a)return;a.classList.remove('has');a.innerHTML=`<div class="hint"><span class="ico">📸</span><span>แนบสลิป / รูปการจ่ายเงิน</span><span style="font-size:11px;color:var(--txt3)">คลิก หรือลากไฟล์มาวาง</span></div>`}

function saveEntry(){
  const amt=parseFloat(document.getElementById('fAmt').value);
  const date=document.getElementById('fDate').value;
  const cat=document.getElementById('fCat').value;
  const note=document.getElementById('fNote').value.trim();
  if(!amt||amt<=0){toast('กรุณากรอกจำนวนเงิน','err');return}
  if(!date){toast('กรุณาเลือกวันที่','err');return}
  let saved;
  if(S.editId){
    const t=S.txns.find(t=>t.id===S.editId);
    if(t){Object.assign(t,{amount:amt,date,category:cat,note,type:S.formType,slipImg:pendingSlip||null});saved=t}
    S.editId=null;toast('แก้ไขรายการเรียบร้อย','ok');
  } else {
    saved={id:Date.now(),type:S.formType,amount:amt,category:cat,date,note,slipImg:pendingSlip||null};
    S.txns.push(saved);toast('บันทึกรายการเรียบร้อย','ok');
  }
  pendingSlip=null;save();
  pushAllGS().then(()=>{if(saved&&saved.slipImg)pushSlipsGS([saved])});

}

function setTypeF(btn,val){
  S.filter.type=val;
  document.querySelectorAll('#ftags .tag[data-v]').forEach(el=>el.classList.remove('on','on-inc','on-exp'));
  btn.classList.add(val==='income'?'on-inc':val==='expense'?'on-exp':'on');
  applyF();
}
function setMonthF(btn,m){
  const already=btn.classList.contains('on');
  document.querySelectorAll('#ftags .tag[data-m]').forEach(el=>el.classList.remove('on'));
  S.filter.month=already?'all':m;
  if(!already)btn.classList.add('on');

function applyF(){
  if(document.getElementById('ftQ'))S.filter.q=document.getElementById('ftQ').value.toLowerCase();
  if(document.getElementById('ftY'))S.filter.year=document.getElementById('ftY').value;
  let tx=S.txns.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(S.filter.type!=='all')tx=tx.filter(t=>t.type===S.filter.type);
  if(S.filter.year!=='all')tx=tx.filter(t=>new Date(t.date).getFullYear()===+S.filter.year);
  if(S.filter.month!=='all')tx=tx.filter(t=>new Date(t.date).getMonth()===+S.filter.month);
  if(S.filter.q)tx=tx.filter(t=>t.category.toLowerCase().includes(S.filter.q)||(t.note||'').toLowerCase().includes(S.filter.q));
  const wrap=document.getElementById('txnWrap'),sum=document.getElementById('txnSum');
  if(!wrap)return;
  wrap.innerHTML=buildCardList(tx,'txns');
  const inc=sumT(tx,'income'),exp=sumT(tx,'expense');
  if(sum)sum.innerHTML=`แสดง <b>${tx.length}</b> รายการ &nbsp;·&nbsp; รายรับ <b style="color:var(--inc)">฿${fMoney(inc)}</b> &nbsp;·&nbsp; รายจ่าย <b style="color:var(--exp)">฿${fMoney(exp)}</b> &nbsp;·&nbsp; คงเหลือ <b style="color:var(--brand)">฿${fMoney(inc-exp)}</b>`;
}
function editTxn(id){S.editId=id;S.formType=S.txns.find(t=>t.id===id)?.type||'expense';navTo('add')}
function delTxn(id){
  if(!confirm('🗑️ ลบรายการนี้?'))return;
  S.txns=S.txns.filter(t=>t.id!==id);save();pushAllGS();toast('ลบรายการแล้ว');
  if(S.page==='transactions')applyF();else renderOverview();
}

/* Slip lazy load */
function slipCell(t){
  if(t.slipImg)return`<span class="slip-dot"></span><span class="slip-link" onclick="event.stopPropagation();lbOpenById(${t.id})">📎 สลิป</span>`;
  if(t._sp)return`<button class="load-btn" data-id="${t.id}" onclick="event.stopPropagation();loadSlip(this)">📎 โหลด</button>`;
  return'';
}
async function loadSlip(btn){
  const id=+btn.dataset.id,t=S.txns.find(x=>x.id===id);if(!t)return;
  btn.textContent='⏳';btn.disabled=true;
  const res=await gsReq({action:'readSlip',id:t.id});
  if(res&&res.data){t.slipImg=res.data;t._sp=false;save();const td=btn.closest('.tc-meta');if(td)td.innerHTML=`<span class="slip-dot"></span><span class="slip-link" onclick="event.stopPropagation();lbOpenById(${t.id})">📎 สลิป</span>`}
  else{btn.textContent='❌';setTimeout(()=>{btn.textContent='📎 โหลด';btn.disabled=false},2000)}
}

/* ════════════════════════════════════════════
   REPORTS  — รายวัน/สัปดาห์/เดือน/ปี
════════════════════════════════════════════ */
function renderReports(){
  const p=S.reportPeriod;
  document.getElementById('pageContent').innerHTML=`
    <div class="period-bar" style="margin-bottom:1.125rem">
      <button class="pb ${p==='daily'?'on':''}" onclick="setRP('daily')">📅 รายวัน</button>
      <button class="pb ${p==='weekly'?'on':''}" onclick="setRP('weekly')">📆 รายสัปดาห์</button>
      <button class="pb ${p==='monthly'?'on':''}" onclick="setRP('monthly')">🗓️ รายเดือน</button>
      <button class="pb ${p==='yearly'?'on':''}" onclick="setRP('yearly')">📅 รายปี</button>
    </div>
    <div id="rptBody"></div>`;
  buildReport();
}
function setRP(p){S.reportPeriod=p;renderReports()}
function buildReport(){
  const p=S.reportPeriod,n=now();
  let rows=[];
  if(p==='daily'){for(let i=29;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);const ds=fdi(d),tx=S.txns.filter(t=>t.date===ds);if(tx.length)rows.push({lbl:fDate(d,{day:'numeric',month:'short'}),inc:sumT(tx,'income'),exp:sumT(tx,'expense'),cnt:tx.length})}}
  else if(p==='weekly'){
    for(let i=11;i>=0;i--){
      const d=new Date(n);d.setDate(n.getDate()-i*7);
      const dow=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));mon.setHours(0,0,0,0);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
      const tx=S.txns.filter(t=>{const td=new Date(t.date);return td>=mon&&td<=sun});
      if(tx.length)rows.push({lbl:fDate(mon,{day:'numeric',month:'short'})+'–'+fDate(sun,{day:'numeric',month:'short'}),inc:sumT(tx,'income'),exp:sumT(tx,'expense'),cnt:tx.length});
    }
  }
  else if(p==='monthly'){for(let i=11;i>=0;i--){const d=new Date(n.getFullYear(),n.getMonth()-i,1);const tx=S.txns.filter(t=>{const td=new Date(t.date);return td.getFullYear()===d.getFullYear()&&td.getMonth()===d.getMonth()});rows.push({lbl:d.toLocaleDateString('th-TH',{month:'long',year:'2-digit'}),inc:sumT(tx,'income'),exp:sumT(tx,'expense'),cnt:tx.length})}}
  else{const yrs=[...new Set(S.txns.map(t=>new Date(t.date).getFullYear()))].sort();yrs.forEach(y=>{const tx=S.txns.filter(t=>new Date(t.date).getFullYear()===y);rows.push({lbl:String(y),inc:sumT(tx,'income'),exp:sumT(tx,'expense'),cnt:tx.length})})}

  if(!rows.length&&p==='yearly'){const cx=getPeriodTxns('yearly');rows=[{lbl:String(n.getFullYear()),inc:sumT(cx,'income'),exp:sumT(cx,'expense'),cnt:cx.length}]}
  const tInc=rows.reduce((s,r)=>s+r.inc,0),tExp=rows.reduce((s,r)=>s+r.exp,0);

    <div class="sum-strip" style="margin-bottom:1.125rem">

      <div class="sum-card exp"><div class="sum-ic exp">📉</div><div class="sum-lbl">รายจ่ายรวม</div><div class="sum-val exp">฿${fMoney(tExp)}</div></div>
      <div class="sum-card bal"><div class="sum-ic bal">💰</div><div class="sum-lbl">คงเหลือ</div><div class="sum-val bal">฿${fMoney(tInc-tExp)}</div></div>
    </div>
    <div class="card" style="margin-bottom:1.125rem">
      <div class="ch"><h3>📈 กราฟแนวโน้ม</h3></div>
      <div class="cb" style="padding:.875rem"><div class="cw" style="height:220px"><canvas id="rptC"></canvas></div></div>
    </div>
    <div class="card">
      <div class="ch"><h3>📋 ตารางสรุป</h3></div>
      <div style="overflow-x:auto">
        <table class="rtbl">
          <thead><tr><th>ช่วงเวลา</th><th>รายการ</th><th style="text-align:right">รายรับ</th><th style="text-align:right">รายจ่าย</th><th style="text-align:right">คงเหลือ</th><th style="text-align:right">%ออม</th></tr></thead>
          <tbody>${rows.map(r=>{const b=r.inc-r.exp,sp=r.inc>0?Math.round(b/r.inc*100):0;return`<tr><td>${r.lbl}</td><td style="color:var(--txt3)">${r.cnt}</td><td class="ai" style="text-align:right">฿${fMoney(r.inc)}</td><td class="ae" style="text-align:right">฿${fMoney(r.exp)}</td><td class="${b>=0?'ai':'ae'}" style="text-align:right">฿${fMoney(b)}</td><td style="text-align:right;color:var(--txt2)">${r.inc>0?sp+'%':'—'}</td></tr>`}).join('')}</tbody>
        </table>
      </div>
    </div>`;
  if(document.getElementById('rptC')){
    S.charts.report=new Chart(document.getElementById('rptC'),{type:'line',
      data:{labels,datasets:[{label:'รายรับ',data:incD,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.08)',fill:true,tension:.35,pointRadius:3},{label:'รายจ่าย',data:expD,borderColor:'#f43f5e',backgroundColor:'rgba(244,63,94,.08)',fill:true,tension:.35,pointRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:8,font:{size:10}}}},
        scales:{y:{ticks:{callback:v=>fShort(v),font:{size:9}},grid:{color:'rgba(128,128,128,.07)'}},x:{grid:{display:false},ticks:{font:{size:9},maxRotation:45}}}}});
  }
}

function txnToRow(t){return[t.id,t.date,t.type==='income'?'รายรับ':'รายจ่าย',t.category,t.amount.toFixed(2),t.note||'',t.slipImg?'1':'']}
function rowToTxn(r){
  if(!r[0])return null;
  const hs=r[6]==='1'||r[6]===1||r[6]===true||r[6]==='TRUE';
  return{id:+r[0],date:r[1],type:r[2]==='รายรับ'?'income':'expense',category:r[3],amount:parseFloat(r[4])||0,note:r[5]||'',slipImg:null,_sp:hs,_hs:hs};
}
async function gsReq(params){
  if(!S.gs.url)return null;
  try{
    if(params.action==='read'||params.action==='readCats'){const res=await fetch(S.gs.url+'?action='+params.action);return await res.json()}
    if(params.action==='readSlip'){const res=await fetch(S.gs.url+'?action=readSlip&id='+encodeURIComponent(params.id));return await res.json()}
    const res=await fetch(S.gs.url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(params)});return await res.json();
  }catch(e){console.warn('GS:',e);return null}
}
async function pushAllGS(){if(!S.gs.on||!S.gs.url)return;await gsReq({action:'write',rows:S.txns.map(txnToRow)})}
async function pushSlipsGS(txns){
  if(!S.gs.on||!S.gs.url)return;
  for(const t of txns){if(!t.slipImg)continue;const CHUNK=40000,chunks=[];for(let i=0;i<t.slipImg.length;i+=CHUNK)chunks.push(t.slipImg.slice(i,i+CHUNK));await gsReq({action:'writeSlip',id:t.id,chunks})}
}
async function pullGS(){
  if(!S.gs.on||!S.gs.url)return false;
  const data=await gsReq({action:'read'});if(!Array.isArray(data))return false;
  const txns=data.map(rowToTxn).filter(Boolean);
  const ws=txns.filter(t=>t._hs);
  for(let i=0;i<ws.length;i++){
    const t=ws[i];const el=document.getElementById('gsOvlTxt');if(el)el.textContent=`กำลังโหลดสลิป ${i+1}/${ws.length}…`;
    const res=await gsReq({action:'readSlip',id:t.id});
    if(res&&res.data){t.slipImg=res.data;t._sp=false}
  }
  txns.forEach(t=>delete t._hs);S.txns=txns;save();return true;
}
async function pullCatsGS(){
  if(!S.gs.on||!S.gs.url)return;
  const data=await gsReq({action:'readCats'});if(!Array.isArray(data)||!data.length)return;
  const nc={income:[],expense:[]};
  data.forEach(r=>{const type=r[0],e=r[1],n=r[2];if((type==='income'||type==='expense')&&n)nc[type].push({e:e||'🌸',n})});
  if(nc.income.length||nc.expense.length){S.cats=nc;save()}
}
async function pushCatsGS(){
  if(!S.gs.on||!S.gs.url)return;
  const rows=[...S.cats.income.map(c=>['income',c.e,c.n]),...S.cats.expense.map(c=>['expense',c.e,c.n])];
  await gsReq({action:'writeCats',rows});
}
async function syncAll(){await pushAllGS();await pushSlipsGS(S.txns.filter(t=>t.slipImg));await pushCatsGS()}

function saveGS(){S.gs.url=document.getElementById('gsUrl')?.value.trim()||'';S.gs.on=document.getElementById('gsOn')?.checked||false;save();toast('บันทึกการตั้งค่าแล้ว','ok')}
async function testGS(){
  const el=document.getElementById('gsSt'),url=document.getElementById('gsUrl')?.value.trim()||S.gs.url;
  if(!url){if(el)el.innerHTML='<span class="sync-err">❌ กรุณากรอก URL</span>';return}
  if(el)el.innerHTML='<span class="sync-wait">⏳ กำลังทดสอบ…</span>';
  try{const res=await fetch(url+'?action=read'),data=await res.json();
    if(Array.isArray(data)){if(el)el.innerHTML=`<span class="sync-ok">✅ เชื่อมต่อสำเร็จ (${data.length} rows)</span>`}
    else{if(el)el.innerHTML='<span class="sync-err">❌ Response ผิดรูปแบบ</span>'}
  }catch(e){if(el)el.innerHTML='<span class="sync-err">❌ '+e.message+'</span>'}
}
async function manualPull(){
  const el=document.getElementById('gsSt');if(!S.gs.url){toast('กรุณากรอก URL ก่อน','err');return}
  if(el)el.innerHTML='<span class="sync-wait">⏳ ดึงข้อมูล…</span>';
  const ok=await pullGS();await pullCatsGS();
  if(ok){if(el)el.innerHTML=`<span class="sync-ok">✅ ดึงสำเร็จ (${S.txns.length} รายการ)</span>`;toast('ดึงข้อมูลสำเร็จ','ok');navTo('overview')}
  else{if(el)el.innerHTML='<span class="sync-err">❌ ไม่สำเร็จ</span>'}
}
async function manualPush(){
  const el=document.getElementById('gsSt');if(!S.gs.url){toast('กรุณากรอก URL ก่อน','err');return}
  if(el)el.innerHTML='<span class="sync-wait">⏳ อัปโหลด…</span>';
  await pushAllGS();const ws=S.txns.filter(t=>t.slipImg);if(ws.length){if(el)el.innerHTML=`<span class="sync-wait">⏳ อัปโหลดสลิป (${ws.length})…</span>`;await pushSlipsGS(ws)}
  await pushCatsGS();if(el)el.innerHTML=`<span class="sync-ok">✅ สำเร็จ</span>`;toast('อัปโหลดสำเร็จ','ok');
}

function exportExcel(){
  const data=[['วันที่','ประเภท','หมวดหมู่','จำนวน','หมายเหตุ','มีสลิป']];
  S.txns.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t=>data.push([t.date,t.type==='income'?'รายรับ':'รายจ่าย',t.category,t.amount.toFixed(2),t.note,t.slipImg?'✓':'']));
  const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:12},{wch:10},{wch:22},{wch:14},{wch:24},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'รายการ');XLSX.writeFile(wb,'FinFlow_'+fdi(now())+'.xlsx');toast('ดาวน์โหลด Excel แล้ว','ok');
}
function exportPDF(){
  const tx=S.txns.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const inc=sumT(tx,'income'),exp=sumT(tx,'expense');
  const html=`<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><title>FinFlow Report</title><style>body{font-family:'Sarabun',sans-serif;padding:2rem;color:#2d1b69;font-size:13px}h1{color:#ff6b9d;margin-bottom:.25rem}.s{display:flex;gap:2rem;background:#fdf2f8;border-radius:10px;padding:1rem;margin-bottom:1.25rem}.sv{font-size:18px;font-weight:700}.inc{color:#10b981}.exp{color:#f43f5e}.bal{color:#ff6b9d}table{width:100%;border-collapse:collapse}th{background:#fdf2f8;padding:.45rem .7rem;text-align:left;font-size:10px;color:#a78bcc;text-transform:uppercase}td{padding:.45rem .7rem;border-bottom:1px solid #f0e8ff}</style></head><body><h1>🌸 FinFlow — รายงาน</h1><p style="color:#a78bcc;font-size:11px;margin-bottom:1rem">สร้างเมื่อ ${new Date().toLocaleDateString('th-TH',{dateStyle:'full'})}</p><div class="s"><div><div style="font-size:10px;color:#a78bcc">รายรับรวม</div><div class="sv inc">฿${fMoney(inc)}</div></div><div><div style="font-size:10px;color:#a78bcc">รายจ่ายรวม</div><div class="sv exp">฿${fMoney(exp)}</div></div><div><div style="font-size:10px;color:#a78bcc">คงเหลือ</div><div class="sv bal">฿${fMoney(inc-exp)}</div></div></div><table><thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>จำนวน</th><th>หมายเหตุ</th></tr></thead><tbody>${tx.map(t=>`<tr><td>${fDate(t.date)}</td><td>${t.type==='income'?'💚':'❤️'} ${t.type==='income'?'รายรับ':'รายจ่าย'}</td><td>${t.category}</td><td style="text-align:right;color:${t.type==='income'?'#10b981':'#f43f5e'}">฿${fMoney(t.amount)}</td><td>${t.note||''}</td></tr>`).join('')}</tbody></table><script>window.print()<\/script></body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close()}else toast('กรุณาอนุญาต popup','err');
}
function importCSV(){document.getElementById('csvFile')?.click()}
function procCSV(e){
  const file=e.target.files[0];if(!file)return;const r=new FileReader();
  r.onload=ev=>{const lines=ev.target.result.split('\n').filter(l=>l.trim());let c=0;
    lines.slice(1).forEach(line=>{const p=line.split(',').map(x=>x.replace(/^"|"$/g,'').trim());if(p.length>=4){const[date,typeStr,cat,amt,note='']= p;const type=typeStr.includes('รับ')?'income':'expense';const amount=parseFloat(amt);if(date&&amount>0){S.txns.push({id:Date.now()+c,type,amount,category:cat||'อื่นๆ',date,note,slipImg:null});c++}}});
    save();toast('นำเข้า '+c+' รายการ','ok');navTo(S.page);};r.readAsText(file,'UTF-8');
}
function clearData(){if(!confirm('ล้างข้อมูลทั้งหมด?'))return;S.txns=[];save();pushAllGS();toast('ล้างข้อมูลแล้ว');navTo('overview')}
function seedData(){
  const n=now();const tx=[];
  for(let m=0;m<6;m++){
    const mo=new Date(n.getFullYear(),n.getMonth()-m,1);
    tx.push({id:Date.now()+m*10000,type:'income',amount:25000+Math.random()*10000,category:'เงินเดือน',date:fdi(new Date(mo.getFullYear(),mo.getMonth(),25)),note:'เงินเดือน',slipImg:null});
    if(m%2===0)tx.push({id:Date.now()+m*10000+1,type:'income',amount:2000+Math.random()*5000,category:'ฟรีแลนซ์',date:fdi(new Date(mo.getFullYear(),mo.getMonth(),10)),note:'งานเสริม',slipImg:null});
    S.cats.expense.slice(0,7).forEach((c,i)=>{const d=new Date(mo.getFullYear(),mo.getMonth(),3+i*4);tx.push({id:Date.now()+m*10000+i+10,type:'expense',amount:200+Math.random()*3000,category:c.n,date:fdi(d),note:'',slipImg:null})});
  }
  S.txns=tx;save();toast('เพิ่มข้อมูลทดสอบแล้ว','ok');navTo('overview');
}
